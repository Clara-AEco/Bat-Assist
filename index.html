<title>Bat Survey</title>

<style>

.surveyor-dot { width:16px; height:16px; border-radius:50%; background:var(--teal); border:2px solid #fff; box-shadow:0 0 0 6px rgba(79,184,168,0.25); animation:pulse-dot 2s infinite; position:relative; }

  0%, 100% { box-shadow:0 0 0 6px rgba(232,90,106,0.45); transform:scale(1); }

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ============================================================
   CONSTANTS
   ============================================================ */
const KIT_TYPES = {
  DJI_M4T: { label: 'DJI Matrice 4T', fov: 45, defaultRadius: 85, category: 'nva', color: '#E8833A', shape: 'wedge' },
  DJI_M30T: { label: 'DJI Matrice 30T', fov: 61, defaultRadius: 85, category: 'nva', color: '#6FBF73', shape: 'wedge' },
  TK612: { label: 'Guide TK612 Gen2', fov: 44.3, defaultRadius: 50, category: 'nva', color: '#5BA3D0', shape: 'wedge' },
  ACOUSTIC: { label: 'Acoustic Detector', fov: null, defaultRadius: null, category: 'acoustic', color: '#B266D6', shape: 'square' },
  OTHER: { label: 'Other', fov: 45, defaultRadius: 50, category: 'nva', color: '#999999', shape: 'wedge' },
};
const ACTIVITY_TYPES = [
  { id: 'emergence', label: 'Emergence' },
  { id: 'return', label: 'Return / re-entry' },
  { id: 'commuting', label: 'Commuting' },
  { id: 'foraging', label: 'Foraging' },
  { id: 'social', label: 'Social call' },
  { id: 'swarming', label: 'Swarming' },
  { id: 'unknown', label: 'Unknown / unidentified' },
];
const ACTIVITY_COLORS = { emergence:'#E8833A', return:'#5BA3D0', commuting:'#6FBF73', foraging:'#D6C04A', social:'#B266D6', swarming:'#E85A6A', unknown:'#999999' };
const UK_SPECIES = ['Common pipistrelle','Soprano pipistrelle',"Nathusius' pipistrelle",'Brown long-eared bat','Grey long-eared bat',"Daubenton's bat","Natterer's bat","Bechstein's bat",'Whiskered bat',"Brandt's bat",'Serotine','Noctule',"Leisler's bat",'Barbastelle','Greater horseshoe bat','Lesser horseshoe bat','Unidentified bat species'];

/* ============================================================
   HELPERS
   ============================================================ */
const STORAGE_KEY = 'batsurvey_data_v1';
const IDENTITY_KEY = 'batsurvey_identity_v1';
const COORDINATOR_PIN = '2026'; // shared PIN for coordinator/superuser access — change as needed

function loadData() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return JSON.parse(raw); } catch(e){}
  return { projects: [] };
}
function saveData(data) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){} }
function loadIdentity() {
  try { const raw = localStorage.getItem(IDENTITY_KEY); if (raw) return JSON.parse(raw); } catch(e){}
  return null;
}
function saveIdentity(identity) { try { localStorage.setItem(IDENTITY_KEY, JSON.stringify(identity)); } catch(e){} }
function uid() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }
function todayStr() { return new Date().toISOString().slice(0,10); }

function calcSunset(lat, lon, date) {
  const d = new Date(date);
  const dayOfYear = Math.floor((d - new Date(d.getFullYear(),0,0)) / 86400000);
  const zenith = 90.833;
  const lngHour = lon/15;
  const t = dayOfYear + ((18-lngHour)/24);
  const M = (0.9856*t) - 3.289;
  let L = M + (1.916*Math.sin(M*Math.PI/180)) + (0.020*Math.sin(2*M*Math.PI/180)) + 282.634;
  L = ((L%360)+360)%360;
  let RA = Math.atan(0.91764*Math.tan(L*Math.PI/180))*180/Math.PI;
  RA = ((RA%360)+360)%360;
  const Lq = Math.floor(L/90)*90, RAq = Math.floor(RA/90)*90;
  RA = (RA + (Lq-RAq))/15;
  const sinDec = 0.39782*Math.sin(L*Math.PI/180);
  const cosDec = Math.cos(Math.asin(sinDec));
  const cosH = (Math.cos(zenith*Math.PI/180) - (sinDec*Math.sin(lat*Math.PI/180))) / (cosDec*Math.cos(lat*Math.PI/180));
  if (cosH > 1 || cosH < -1) return null;
  let H = Math.acos(cosH)*180/Math.PI/15;
  const T = H + RA - (0.06571*t) - 6.622;
  let UT = ((T-lngHour)%24+24)%24;
  const tz = -d.getTimezoneOffset()/60;
  let lt = ((UT+tz)%24+24)%24;
  const hh = Math.floor(lt), mm = Math.round((lt-hh)*60);
  return String(hh).padStart(2,'0')+':'+String(mm%60).padStart(2,'0');
}

function destPoint(lat, lon, bearingDeg, distM) {
  const R = 6371000;
  const brng = bearingDeg*Math.PI/180, lat1 = lat*Math.PI/180, lon1 = lon*Math.PI/180;
  const lat2 = Math.asin(Math.sin(lat1)*Math.cos(distM/R) + Math.cos(lat1)*Math.sin(distM/R)*Math.cos(brng));
  const lon2 = lon1 + Math.atan2(Math.sin(brng)*Math.sin(distM/R)*Math.cos(lat1), Math.cos(distM/R)-Math.sin(lat1)*Math.sin(lat2));
  return [lat2*180/Math.PI, lon2*180/Math.PI];
}
function wedgePolygon(lat, lon, bearingDeg, fovDeg, radiusM, steps=10) {
  const points = [[lat,lon]];
  const start = bearingDeg - fovDeg/2, end = bearingDeg + fovDeg/2;
  for (let i=0;i<=steps;i++) points.push(destPoint(lat,lon, start+(end-start)*(i/steps), radiusM));
  points.push([lat,lon]);
  return points;
}
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

function sanitizeFilenamePart(s) {
  return String(s || '').trim().replace(/[^a-zA-Z0-9]+/g, '_').replace(/^_+|_+$/g, '');
}
function exportFilenameBase(project, session) {
  return [sanitizeFilenamePart(project.name), sanitizeFilenamePart(session.date).replace(/-/g,''), sanitizeFilenamePart(session.label)].filter(Boolean).join('_');
}
function csvEscape(v) {
  if (v === null || v === undefined) return '';
  const s = String(v);
  if (s.includes(',') || s.includes('"') || s.includes('\n')) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}
function toCSV(rows, headers) {
  const lines = [headers.join(',')];
  for (const row of rows) lines.push(headers.map(h => csvEscape(row[h])).join(','));
  return lines.join('\n');
}
const OBS_CSV_HEADERS = ['project_name','survey_date','session_id','surveyor_id','observation_time','latitude','longitude','equipment_point','species','activity_type','notes','photo_ref'];
function observationsToCSVRows(project, session) {
  const equipment = session.equipment || [];
  return (session.observations || []).map(obs => {
    const eq = equipment.find(e => e.id === obs.equipmentId);
    return {
      project_name: project.name,
      survey_date: session.date,
      session_id: session.label,
      surveyor_id: obs.addedBy || '',
      observation_time: obs.time,
      latitude: obs.lat != null ? obs.lat : '',
      longitude: obs.lon != null ? obs.lon : '',
      equipment_point: eq ? eq.unitId : (obs.equipmentUnitId || ''),
      species: obs.species,
      activity_type: (ACTIVITY_TYPES.find(a=>a.id===obs.activity)||{}).label || obs.activity,
      notes: obs.notes || '',
      photo_ref: obs.photoTap ? `${(eq && eq.unitId) || obs.equipmentUnitId || 'equipment'}_photo (tap at ${(obs.photoTap.x*100).toFixed(0)}%,${(obs.photoTap.y*100).toFixed(0)}%)` : '',
    };
  });
}
function observationsToGeoJSON(project, session) {
  const rows = observationsToCSVRows(project, session);
  const obsList = session.observations || [];
  return {
    type: 'FeatureCollection',
    features: rows.map((row, i) => {
      const obs = obsList[i];
      if (obs.lat == null || obs.lon == null) return null;
      return {
        type: 'Feature',
        geometry: { type: 'Point', coordinates: [obs.lon, obs.lat] },
        properties: row,
      };
    }).filter(Boolean)
  };
}
function equipmentToGeoJSON(project, session) {
  return {
    type: 'FeatureCollection',
    features: (session.equipment || []).map(eq => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [eq.lon, eq.lat] },
      properties: {
        site: project.name, unit_id: eq.unitId, kit: (KIT_TYPES[eq.kit]||{}).label || eq.kit,
        radius_m: eq.radius, bearing: eq.bearing, fov_deg: eq.fov, height_m: eq.height,
        notes: eq.notes || '', added_by: eq.addedBy || '',

}

function downloadBlob(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

/* ============================================================
   FIREBASE SYNC HOOK
   ============================================================
   Subscribes to remote equipment/observations/meta/surveyors for a
   session and upserts them into local state via onUpdate. Provides
   push functions to write local changes to Firebase. Degrades to a
   set of no-ops if Firebase is unavailable — app works fully offline
   on local data in that case.

   NOTE: photos (sitePhoto, equipment.photo) and referenceLayers are
   intentionally excluded from sync (kept local-only).
   ============================================================ */
function useFirebaseSync(projectId, sessionId, session, onUpdate, identity) {
  const [connected, setConnected] = useState(false);
  const [otherSurveyors, setOtherSurveyors] = useState({});
  const sessionRef = useRef(session);
  sessionRef.current = session;

  useEffect(() => {
    if (!fbDb || !projectId || !sessionId) return;
    const key = syncKey(projectId, sessionId);

    const connRef = fbDb.ref('.info/connected');
    const connHandler = (snap) => setConnected(!!snap.val());
    connRef.on('value', connHandler);

    // Equipment: upsert by id
    const eqRef = fbDb.ref(`${key}/equipment`);
    const eqHandler = (snap) => {
      const remote = snap.val() || {};
      const current = sessionRef.current.equipment || [];
      const byId = {};
      current.forEach(e => { byId[e.id] = e; });
      let changed = false;
      Object.entries(remote).forEach(([id, item]) => {
        if (!byId[id] || (item.updatedAt || 0) > (byId[id].updatedAt || 0)) {
          byId[id] = item;
          changed = true;
        }
      });
      // Remove items that exist locally but not remotely (were deleted elsewhere)
      // Only do this for items that have been seen remotely before (have updatedAt)
      Object.keys(byId).forEach(id => {
        if (byId[id].updatedAt && !remote[id]) {
          delete byId[id];
          changed = true;
        }
      });
      if (changed) onUpdate({ equipment: Object.values(byId) });
    };
    eqRef.on('value', eqHandler);

    // Observations: upsert by id
    const obsRef = fbDb.ref(`${key}/observations`);
    const obsHandler = (snap) => {
      const remote = snap.val() || {};
      const current = sessionRef.current.observations || [];
      const byId = {};
      current.forEach(o => { byId[o.id] = o; });
      let changed = false;
      Object.entries(remote).forEach(([id, item]) => {
        if (!byId[id] || (item.updatedAt || 0) > (byId[id].updatedAt || 0)) {
          byId[id] = item;
          changed = true;
        }
      });
      Object.keys(byId).forEach(id => {
        if (byId[id].updatedAt && !remote[id]) {
          delete byId[id];
          changed = true;
        }
      });
      if (changed) onUpdate({ observations: Object.values(byId) });
    };
    obsRef.on('value', obsHandler);

    // Meta (setup fields): whole-blob, last-write-wins
    const metaRef = fbDb.ref(`${key}/meta`);
    const metaHandler = (snap) => {
      const remote = snap.val();
      if (!remote) return;
      const current = sessionRef.current;
      if ((remote.updatedAt || 0) > (current.metaUpdatedAt || 0)) {
        const { updatedAt, updatedBy, ...fields } = remote;
        onUpdate({ ...fields, metaUpdatedAt: updatedAt });
      }
    };
    metaRef.on('value', metaHandler);

    // Surveyor positions (excluding self)
    const surveyorsRef = fbDb.ref(`${key}/surveyors`);
    const surveyorsHandler = (snap) => {
      const remote = snap.val() || {};
      const others = {};
      const myKey = fbKey(identity.name);
      Object.entries(remote).forEach(([key, info]) => {
        if (key !== myKey) others[info.displayName || key] = { ...info, fbKey: key };
      });
      setOtherSurveyors(others);
    };
    surveyorsRef.on('value', surveyorsHandler);

    return () => {
      connRef.off('value', connHandler);
      eqRef.off('value', eqHandler);
      obsRef.off('value', obsHandler);
      metaRef.off('value', metaHandler);
      surveyorsRef.off('value', surveyorsHandler);
    };
  }, [projectId, sessionId]);

  function pushEquipment(item) {
    if (!fbDb) return;
    const key = syncKey(projectId, sessionId);
    fbDb.ref(`${key}/equipment/${item.id}`).set({ ...item, updatedAt: Date.now() }).catch(()=>{});
  }
  function removeEquipment(id) {
    if (!fbDb) return;
    const key = syncKey(projectId, sessionId);
    fbDb.ref(`${key}/equipment/${id}`).remove().catch(()=>{});
  }
  function pushObservation(item) {
    if (!fbDb) return;
    const key = syncKey(projectId, sessionId);
    fbDb.ref(`${key}/observations/${item.id}`).set({ ...item, updatedAt: Date.now() }).catch(()=>{});
  }
  function removeObservation(id) {
    if (!fbDb) return;
    const key = syncKey(projectId, sessionId);
    fbDb.ref(`${key}/observations/${id}`).remove().catch(()=>{});
  }
  function pushMeta(fields) {
    if (!fbDb) return;
    const key = syncKey(projectId, sessionId);
    fbDb.ref(`${key}/meta`).set({ ...fields, updatedAt: Date.now(), updatedBy: identity.name }).catch(()=>{});
  }
  function pushSurveyorPosition(lat, lon) {
    if (!fbDb) return;
    const key = syncKey(projectId, sessionId);
    fbDb.ref(`${key}/surveyors/${fbKey(identity.name)}`).update({ lat, lon, lastUpdate: Date.now(), isSuperuser: !!identity.isSuperuser, displayName: identity.name }).catch(()=>{});
  }
  function pushSurveyorAlert(active) {
    if (!fbDb) return Promise.reject(new Error('No connection'));
    const key = syncKey(projectId, sessionId);
    return fbDb.ref(`${key}/surveyors/${fbKey(identity.name)}`).update({
      displayName: identity.name, isSuperuser: !!identity.isSuperuser,
      alert: active ? { active: true, since: Date.now() } : { active: false }
    });
  }
  function clearSurveyorAlert(surveyorKey) {
    if (!fbDb) return;
    const key = syncKey(projectId, sessionId);
    fbDb.ref(`${key}/surveyors/${surveyorKey}/alert`).set({ active: false }).catch(()=>{});
  }

  return {
    connected: !!fbDb && connected,
    available: !!fbDb,
    otherSurveyors,
    pushEquipment, removeEquipment, pushObservation, removeObservation, pushMeta, pushSurveyorPosition,
    pushSurveyorAlert, clearSurveyorAlert
  };
}

/* ============================================================
   PROJECT INDEX SYNC
   ============================================================
   Syncs a lightweight "directory" of projects and sessions (id, name,
   label, date, status, archived — NOT full content) so every device
   knows what projects/sessions exist, can list them, and can resolve
   join links for sessions created on other devices. Full session
   content (equipment/observations/etc) syncs separately via
   useFirebaseSync once a session is opened.
   ============================================================ */
function useProjectIndexSync(projects, setData) {
  const [indexLoaded, setIndexLoaded] = useState(!fbDb); // true immediately if no Firebase
  const projectsRef = useRef(projects);
  projectsRef.current = projects;

  useEffect(() => {
    if (!fbDb) return;
    const ref = fbDb.ref('sync/projects');
    const handler = (snap) => {
      const remote = snap.val() || {};
      setData(d => {
        const projects = d.projects || [];
        const byId = {};
        projects.forEach(p => { byId[p.id] = p; });
        let changed = false;

        Object.entries(remote).forEach(([pid, rp]) => {
          const remoteSessions = rp.sessions || {};
          if (!byId[pid]) {
            // New project from another device — create local shell
            byId[pid] = {
              id: pid, name: rp.name, archived: !!rp.archived, createdAt: rp.createdAt || Date.now(),
              sessions: Object.entries(remoteSessions).map(([sid, rs]) => ({
                id: sid, label: rs.label, date: rs.date, status: rs.status, createdAt: rs.createdAt || Date.now(),
                surveyStart:'', surveyEnd:'', sunset:'', weather:{mode:'auto',temp:'',wind:'',cloud:'',precip:''},
                sitePhoto:null, notes:'', equipment:[], observations:[], surveyors:[], referenceLayers:[],
              }))
            };
            changed = true;
          } else {
            const local = byId[pid];
            let proj = local;
            if ((rp.updatedAt || 0) > (local.indexUpdatedAt || 0)) {
              proj = { ...local, name: rp.name, archived: !!rp.archived, indexUpdatedAt: rp.updatedAt };
              changed = true;
            }
            const localSessions = proj.sessions || [];
            const sessByid = {};
            localSessions.forEach(s => { sessByid[s.id] = s; });
            Object.entries(remoteSessions).forEach(([sid, rs]) => {
              if (!sessByid[sid]) {
                sessByid[sid] = {
                  id: sid, label: rs.label, date: rs.date, status: rs.status, createdAt: rs.createdAt || Date.now(),
                  surveyStart:'', surveyEnd:'', sunset:'', weather:{mode:'auto',temp:'',wind:'',cloud:'',precip:''},
                  sitePhoto:null, notes:'', equipment:[], observations:[], surveyors:[], referenceLayers:[],
                };
                changed = true;
              } else if ((rs.updatedAt || 0) > (sessByid[sid].indexUpdatedAt || 0)) {
                sessByid[sid] = { ...sessByid[sid], label: rs.label, date: rs.date, status: rs.status, indexUpdatedAt: rs.updatedAt };
                changed = true;
              }
            });
            if (changed) proj = { ...proj, sessions: Object.values(sessByid) };
            byId[pid] = proj;
          }
        });

        if (!changed) return d;
        return { ...d, projects: Object.values(byId) };
      });
      setIndexLoaded(true);
    };
    ref.on('value', handler);
    return () => ref.off('value', handler);
  }, []);

  function pushProjectIndex(project) {
    if (!fbDb) return;
    fbDb.ref(`sync/projects/${project.id}`).update({
      name: project.name, archived: !!project.archived,
      createdAt: project.createdAt, updatedAt: Date.now()
    }).catch(()=>{});
  }
  function pushSessionIndex(projectId, session) {
    if (!fbDb) return;
    fbDb.ref(`sync/projects/${projectId}/sessions/${session.id}`).update({
      label: session.label, date: session.date, status: session.status,
      createdAt: session.createdAt, updatedAt: Date.now()
    }).catch(()=>{});
  }

  return { indexLoaded: indexLoaded || !fbDb, pushProjectIndex, pushSessionIndex };
}

/* ============================================================
   ROOT APP
   ============================================================ */
function App() {
  const [data, setData] = useState(loadData);
  const [identity, setIdentity] = useState(loadIdentity);
  const [showIdentityModal, setShowIdentityModal] = useState(false);
  const [view, setView] = useState(() => {
    // Check for ?join=<projectId>.<sessionId> deep link
    const params = new URLSearchParams(window.location.search);
    const join = params.get('join');
    if (join && join.includes('.')) {
      const [projectId, sessionId] = join.split('.');
      return { screen: 'session', projectId, sessionId, viaJoin: true };
    }
    return { screen: 'projects' };
  });
  useEffect(() => saveData(data), [data]);
  const projects = data.projects || [];
  const projectIndex = useProjectIndexSync(projects, setData);

  function addProject(name) {
    const project = { id: uid(), name, createdAt: Date.now(), archived: false, sessions: [] };
    setData(d => ({ ...d, projects: [...d.projects, project] }));
    projectIndex.pushProjectIndex(project);
  }
  function setProjectArchived(projectId, archived) {
    setData(d => ({ ...d, projects: d.projects.map(p => p.id===projectId ? {...p, archived} : p) }));
    const p = projects.find(p=>p.id===projectId);
    if (p) projectIndex.pushProjectIndex({ ...p, archived });
  }
  function deleteProject(projectId) {
    setData(d => ({ ...d, projects: d.projects.filter(p => p.id !== projectId) }));
    if (fbDb) fbDb.ref(`sync/projects/${projectId}`).remove().catch(()=>{});
  }
  function addSession(projectId, s) {
    setData(d => ({ ...d, projects: d.projects.map(p => p.id===projectId ? {...p, sessions:[...(p.sessions||[]), s]} : p) }));
    projectIndex.pushSessionIndex(projectId, s);
  }
  function updateSession(projectId, sessionId, updates) {
    setData(d => ({ ...d, projects: d.projects.map(p => p.id!==projectId ? p : {...p, sessions: p.sessions.map(s => s.id===sessionId ? {...s, ...updates} : s)}) }));
    // Keep the lightweight index in sync when label/date/status change
    if ('label' in updates || 'date' in updates || 'status' in updates) {
      const p = projects.find(p=>p.id===projectId);
      const s = p && p.sessions.find(s=>s.id===sessionId);
      if (s) projectIndex.pushSessionIndex(projectId, { ...s, ...updates });
    }
  }
  function getSession(projectId, sessionId) {
    const p = projects.find(p=>p.id===projectId);
    return p ? p.sessions.find(s=>s.id===sessionId) : null;
  }
  function handleSaveIdentity(newIdentity) {
    setIdentity(newIdentity);
    saveIdentity(newIdentity);
    setShowIdentityModal(false);
  }

  // First-run: no identity set yet — block until name is entered
  if (!identity) {
    return <IdentityModal current={null} onSave={handleSaveIdentity} />;
  }

  const switchUserModal = showIdentityModal && (
    <IdentityModal current={identity} onSave={handleSaveIdentity} onClose={()=>setShowIdentityModal(false)} />
  );

  if (view.screen === 'projects') {
    return <React.Fragment>
      <ProjectsScreen projects={projects} identity={identity} onSwitchUser={()=>setShowIdentityModal(true)}
        onAddProject={addProject} onOpenProject={id=>setView({screen:'sessions', projectId:id})}
        onSetArchived={setProjectArchived} onDeleteProject={deleteProject}
        onJoinLink={(join)=>{
          const [projectId, sessionId] = join.split('.');
          setView({ screen: 'session', projectId, sessionId, viaJoin: true });
        }} />
      {switchUserModal}
    </React.Fragment>;
  }
  if (view.screen === 'sessions') {
    const project = projects.find(p=>p.id===view.projectId);
    return <React.Fragment>
      <SessionsScreen project={project} identity={identity} onSwitchUser={()=>setShowIdentityModal(true)} onBack={()=>setView({screen:'projects'})}
        onAddSession={s=>addSession(project.id, s)}
        onOpenSession={sid=>setView({screen:'session', projectId:project.id, sessionId:sid})} />
      {switchUserModal}
    </React.Fragment>;
  }
  if (view.screen === 'session') {
    const project = projects.find(p=>p.id===view.projectId);
    const session = getSession(view.projectId, view.sessionId);
    if (!project || !session) {
      if (!projectIndex.indexLoaded) {
        return <React.Fragment>
          <div className="app-shell">
            <Header title="Bat Survey" subtitle="Connecting..." identity={identity} onSwitchUser={()=>setShowIdentityModal(true)} />
            <div className="content">
              <div className="empty-state">
                <div className="spinner" style={{width:28, height:28, borderWidth:3, margin:'0 auto 16px'}} />
                <div className="empty-title">Connecting to session</div>
                <div className="empty-text">Looking up this session — this may take a moment.</div>
              </div>
            </div>
          </div>
          {switchUserModal}
        </React.Fragment>;
      }
      return <React.Fragment>
        <div className="app-shell">
          <Header title="Bat Survey" subtitle="Session not found" identity={identity} onSwitchUser={()=>setShowIdentityModal(true)} />
          <div className="content">
            <EmptyState icon={<IconMapPin/>} title="Session not found"
              text={fbDb
                ? "This session couldn't be found. Check the link is correct, or ask your coordinator to confirm it's still active."
                : "This device has no internet connection and hasn't seen this session before. Connect to the internet to join for the first time."} />
            <button className="btn btn-secondary btn-full" onClick={()=>setView({screen:'projects'})} style={{marginTop:12}}>Go to projects</button>
          </div>
        </div>
        {switchUserModal}
      </React.Fragment>;
    }
    return <React.Fragment>
      <SessionScreen project={project} session={session} identity={identity} onSwitchUser={()=>setShowIdentityModal(true)}
        onBack={view.viaJoin ? null : ()=>setView({screen:'sessions', projectId:project.id})}
        onUpdate={u=>updateSession(project.id, session.id, u)} />
      {switchUserModal}
    </React.Fragment>;
  }
  return null;
}

/* ============================================================
   PROJECTS SCREEN
   ============================================================ */
function ProjectsScreen({ projects, identity, onSwitchUser, onAddProject, onOpenProject, onSetArchived, onDeleteProject, onJoinLink }) {
  const [showAdd, setShowAdd] = useState(false);
  const [showJoin, setShowJoin] = useState(false);
  const [joinInput, setJoinInput] = useState('');
  const [joinError, setJoinError] = useState(false);
  const [name, setName] = useState('');
  const [filter, setFilter] = useState('active'); // active | archived
  const [manageId, setManageId] = useState(null);

  const filtered = projects.filter(p => filter === 'archived' ? !!p.archived : !p.archived);
  const archivedCount = projects.filter(p => p.archived).length;

  function handleJoin() {
    const val = joinInput.trim();
    // Accept either a full URL containing ?join=X.Y, or just "X.Y" pasted directly
    let join = null;
    try {
      const url = new URL(val);
      join = url.searchParams.get('join');
    } catch (e) {
      if (val.includes('.')) join = val;
    }
    if (join && join.includes('.')) {
      setShowJoin(false);
      setJoinInput('');
      setJoinError(false);
      onJoinLink(join);
    } else {
      setJoinError(true);
    }
  }

  return (
    <div className="app-shell">
      <Header title="Bat Survey" subtitle="Projects" identity={identity} onSwitchUser={onSwitchUser} />
      <div className="content">
        {identity.isSuperuser && (
          <div className="segmented" style={{marginBottom:12}}>
            <button className={`segment ${filter==='active'?'segment-active':''}`} onClick={()=>setFilter('active')}>Active</button>
            <button className={`segment ${filter==='archived'?'segment-active':''}`} onClick={()=>setFilter('archived')}>Archived{archivedCount > 0 ? ` (${archivedCount})` : ''}</button>
          </div>
        )}
        {filtered.length === 0 && (
          <EmptyState icon={<IconMapPin />} title={filter === 'archived' ? 'No archived projects' : 'No projects yet'}
            text={filter === 'archived'
              ? "Projects you archive will appear here, ready to back up and delete."
              : identity.isSuperuser
                ? "Create a project for each site you work on, e.g. 'Abbey Works'. Survey sessions live inside projects."
                : "No projects are available on this device yet. Ask your coordinator for a session link."} />
        )}
        <div className="card-list">
          {filtered.map(p => (
            <div key={p.id} className="card-with-actions">
              <button className="card card-tap" onClick={()=>onOpenProject(p.id)} style={{flex:1}}>
                <div className="card-main">
                  <div className="card-title">{p.name}</div>
                  <div className="card-sub">{(p.sessions||[]).length} session{(p.sessions||[]).length===1?'':'s'}</div>
                </div>
                <span className="card-chevron" style={{width:20, height:20}}><Icon d='<polyline points="9 18 15 12 9 6"/>' /></span>
              </button>
              {identity.isSuperuser && (
                <button className="btn btn-icon btn-small" onClick={()=>setManageId(p.id)} aria-label="Manage project">
                  <IconSettings/>
                </button>
              )}
            </div>
          ))}
        </div>
        {filter === 'active' && (
          <button className="btn btn-secondary btn-full" style={{marginTop:12}} onClick={()=>setShowJoin(true)}>
            <IconQR/> Join a session with a link or code
          </button>
        )}
      </div>
      {showJoin && (
        <Modal title="Join a session" onClose={()=>setShowJoin(false)}>
          <p className="modal-text" style={{marginBottom:10}}>
            Paste the link your coordinator shared, or scan their QR code with your camera app and open the link it shows.
          </p>
          <input className="text-input" placeholder="https://...?join=..." value={joinInput} onChange={e=>{ setJoinInput(e.target.value); setJoinError(false); }} autoFocus />
          {joinError && <div className="field-hint field-hint-error">That doesn't look like a valid session link.</div>}
          <div className="modal-actions">
            <button className="btn btn-secondary" onClick={()=>setShowJoin(false)}>Cancel</button>
            <button className="btn btn-primary" disabled={!joinInput.trim()} onClick={handleJoin}>Join</button>
          </div>
        </Modal>
      )}
      {showAdd && (
        <Modal title="New project" onClose={()=>setShowAdd(false)}>
          <label className="field-label">Project name</label>
          <input className="text-input" placeholder="e.g. Abbey Works" value={name} onChange={e=>setName(e.target.value)} autoFocus />
          <div className="modal-actions">
            <button className="btn btn-secondary" onClick={()=>setShowAdd(false)}>Cancel</button>
            <button className="btn btn-primary" disabled={!name.trim()} onClick={()=>{ onAddProject(name.trim()); setName(''); setShowAdd(false); }}>Create</button>
          </div>
        </Modal>
      )}
      {manageId && (() => {
        const p = projects.find(pr => pr.id === manageId);
        if (!p) return null;
        return (
          <Modal title={p.name} onClose={()=>setManageId(null)}>
            <p className="modal-text" style={{marginBottom:14}}>
              {p.archived
                ? "This project is archived. You can unarchive it, or delete it permanently once you've backed up its data."
                : "Archiving hides a completed project from the active list without deleting anything. You can unarchive it anytime."}
            </p>
            {!p.archived ? (
              <button className="btn btn-secondary btn-full" onClick={()=>{ onSetArchived(p.id, true); setManageId(null); }}>Archive project</button>
            ) : (
              <React.Fragment>
                <button className="btn btn-secondary btn-full" onClick={()=>{ onSetArchived(p.id, false); setManageId(null); }} style={{marginBottom:10}}>Unarchive</button>
                <button className="btn btn-danger btn-full" onClick={()=>{
                  if (confirm(`Permanently delete "${p.name}" and all its sessions, equipment and observations?\n\nThis cannot be undone. Make sure you've exported this data first.`)) {
                    onDeleteProject(p.id);
                    setManageId(null);
                  }
                }}>
                  <IconTrash/> Delete permanently
                </button>
              </React.Fragment>
            )}
          </Modal>
        );
      })()}
      {identity.isSuperuser && filter === 'active' && (
        <button className="fab" onClick={()=>setShowAdd(true)} aria-label="New project"><span style={{width:26,height:26}}><IconPlus/></span></button>
      )}
    </div>
  );
}

/* ============================================================
   SESSIONS SCREEN
   ============================================================ */
function SessionsScreen({ project, identity, onSwitchUser, onBack, onAddSession, onOpenSession }) {
  const [showAdd, setShowAdd] = useState(false);
  const [filter, setFilter] = useState('active'); // active | closed
  if (!project) return null;
  const sessions = project.sessions || [];
  const filtered = sessions.filter(s => filter === 'closed' ? s.status === 'closed' : s.status !== 'closed');
  const closedCount = sessions.filter(s => s.status === 'closed').length;

  function createSession() {
    const s = {
      id: uid(), label: `Survey ${sessions.length+1}`, date: todayStr(), status: 'active',
      surveyStart:'', surveyEnd:'', sunset:'', weather:{mode:'auto',temp:'',wind:'',cloud:'',precip:''},
      sitePhoto:null, notes:'', equipment:[], observations:[], surveyors:[], referenceLayers:[], createdAt: Date.now()
    };
    onAddSession(s);
    onOpenSession(s.id);
  }
  return (
    <div className="app-shell">
      <Header title={project.name} subtitle="Survey sessions" onBack={onBack} identity={identity} onSwitchUser={onSwitchUser} />
      <div className="content">
        <div className="segmented" style={{marginBottom:12}}>
          <button className={`segment ${filter==='active'?'segment-active':''}`} onClick={()=>setFilter('active')}>Active</button>
          <button className={`segment ${filter==='closed'?'segment-active':''}`} onClick={()=>setFilter('closed')}>Closed{closedCount > 0 ? ` (${closedCount})` : ''}</button>
        </div>
        {filtered.length === 0 && (
          <EmptyState icon={<IconSettings/>} title={filter === 'closed' ? 'No closed sessions' : 'No active sessions'}
            text={filter === 'closed'
              ? "Sessions you close will appear here."
              : identity.isSuperuser
                ? "Each survey session is one night's standalone data set: setup, equipment map, observations, and export."
                : "No sessions are available yet. Ask your coordinator for a session link."} />
        )}
        <div className="card-list">
          {filtered.map(s => (
            <button key={s.id} className="card card-tap" onClick={()=>onOpenSession(s.id)}>
              <div className="card-main">
                <div className="card-title">{s.label}</div>
                <div className="card-sub">{s.date} · {(s.observations||[]).length} observation{(s.observations||[]).length===1?'':'s'}</div>
              </div>
              <StatusPill status={s.status} />
            </button>
          ))}
        </div>
      </div>
      {showAdd && (
        <Modal title="New survey session" onClose={()=>setShowAdd(false)}>
          <p className="modal-text">A new session will be created for today, ready for setup.</p>
          <div className="modal-actions">
            <button className="btn btn-secondary" onClick={()=>setShowAdd(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={()=>{ createSession(); setShowAdd(false); }}>Create session</button>
          </div>
        </Modal>
      )}
      {identity.isSuperuser && filter === 'active' && (
        <button className="fab" onClick={()=>setShowAdd(true)} aria-label="New session"><span style={{width:26,height:26}}><IconPlus/></span></button>
      )}
    </div>
  );
}

function StatusPill({ status }) {
  const map = { setup:['Setup','pill-setup'], active:['Active','pill-active'], closed:['Closed','pill-closed'] };
  const [label, cls] = map[status] || map.setup;
  return <span className={`pill ${cls}`}>{label}</span>;
}

/* ============================================================
   SESSION SCREEN (tabs)
   ============================================================ */
function SessionScreen({ project, session, identity, onSwitchUser, onBack, onUpdate }) {
  const [tab, setTab] = useState(onBack ? 'setup' : 'map');
  const [myAlertActive, setMyAlertActive] = useState(false);
  const [showAlertConfirm, setShowAlertConfirm] = useState(false);
  const sync = useFirebaseSync(project.id, session.id, session, onUpdate, identity);
  const activeAlerts = Object.entries(sync.otherSurveyors || {}).filter(([name, info]) => info.alert && info.alert.active);
  const activeAlertNames = activeAlerts.map(([name])=>name).join(',');

  // Vibrate when a new alert appears
  const alertKeysRef = useRef('');
  useEffect(() => {
    const keys = activeAlerts.map(([name]) => name).sort().join(',');
    if (keys && keys !== alertKeysRef.current && navigator.vibrate) {
      navigator.vibrate([200, 100, 200, 100, 200]);
    }
    alertKeysRef.current = keys;
  }, [activeAlertNames]);

  if (!session) return null;

  function sendAlert() {
    sync.pushSurveyorAlert(true).then(() => {
      setMyAlertActive(true);
      setShowAlertConfirm(false);
    }).catch(() => {
      alert('Could not send alert — check your internet connection and try again, or contact your coordinator by phone.');
    });
  }
  function cancelAlert() {
    sync.pushSurveyorAlert(false).then(() => setMyAlertActive(false)).catch(() => {});
  }

  return (
    <div className="app-shell">
      <Header title={session.label} subtitle={project.name} onBack={onBack} identity={identity} onSwitchUser={onSwitchUser} />

      {activeAlerts.map(([name, info]) => (
        <AlertBanner key={name} name={name} info={info} identity={identity}
          onGoToMap={()=>setTab('map')}
          onClear={()=>sync.clearSurveyorAlert(info.fbKey)} />
      ))}

      {myAlertActive && (
        <div className="alert-banner alert-banner-self">
          <span className="alert-banner-text">Your alert is active — visible to other surveyors.</span>
          <button className="btn btn-secondary btn-small" onClick={cancelAlert}>I'm OK — cancel</button>
        </div>
      )}

      {sync.available && (
        <div className="sync-indicator">
          <span className={`sync-indicator-status ${sync.connected ? 'sync-on' : 'sync-off'}`}>
            <span className="sync-dot" /> {sync.connected ? 'Synced with team' : 'Offline — changes saved locally'}
          </span>
          {!myAlertActive && (
            <button className="panic-btn" onClick={()=>setShowAlertConfirm(true)} disabled={!sync.available}>
              <IconAlert/> Alert
            </button>
          )}
        </div>
      )}

      <div className="tab-bar">
        <TabButton active={tab==='setup'} onClick={()=>setTab('setup')} icon={<IconSettings/>} label="Setup" />
        <TabButton active={tab==='map'} onClick={()=>setTab('map')} icon={<IconMapPin/>} label="Map" />
        <TabButton active={tab==='observe'} onClick={()=>setTab('observe')} icon={<IconPlus/>} label="Observe" />
        <TabButton active={tab==='export'} onClick={()=>setTab('export')} icon={<IconDownload/>} label="Export" />
      </div>
      <div className="content">
        {tab==='setup' && <SetupTab session={session} onUpdate={onUpdate} project={project} identity={identity} sync={sync} />}
        {tab==='map' && <MapTab session={session} onUpdate={onUpdate} identity={identity} sync={sync} myAlertActive={myAlertActive} />}
        {tab==='observe' && <ObserveTab session={session} onUpdate={onUpdate} identity={identity} sync={sync} />}
        {tab==='export' && (identity.isSuperuser
          ? <ExportTab project={project} session={session} onUpdate={onUpdate} />
          : <LockedTab label="Export is available to coordinators only." />)}
      </div>

      {showAlertConfirm && (
        <Modal title="Send H&S alert?" onClose={()=>setShowAlertConfirm(false)}>
          <p className="modal-text" style={{marginBottom:14}}>
            This will show your location as a flashing alert on every other surveyor's map and screen, right now. Only use this if you need help.
          </p>
          <div className="modal-actions">
            <button className="btn btn-secondary" onClick={()=>setShowAlertConfirm(false)}>Cancel</button>
            <button className="btn btn-danger btn-full" onClick={sendAlert}>Yes, send alert</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function LockedTab({ label }) {
  return (
    <div className="placeholder-tab">
      <span style={{width:32, height:32, display:'block', margin:'0 auto 12px', color:'var(--text-faint)'}}><IconLock/></span>
      <p>{label}</p>
    </div>
  );
}

function PlaceholderTab({ label }) {
  return (
    <div className="placeholder-tab">
      <p>{label}</p>
      <p className="muted-small">Not built yet in this test version.</p>
    </div>
  );
}

/* ============================================================
   EXPORT TAB
   ============================================================ */
function ExportTab({ project, session, onUpdate }) {
  const [formats, setFormats] = useState({ csv: true, geojson: true, pdf: true });
  const [generating, setGenerating] = useState(false);
  const observations = session.observations || [];
  const equipment = session.equipment || [];
  const baseName = exportFilenameBase(project, session);

  function toggleFormat(key) {
    setFormats(f => ({ ...f, [key]: !f[key] }));
  }

  function generateCSV() {
    const rows = observationsToCSVRows(project, session);
    const csv = toCSV(rows, OBS_CSV_HEADERS);
    downloadBlob(`${baseName}_observations.csv`, csv, 'text/csv');
    if (equipment.length > 0) {
      const eqRows = equipmentToCSVRows(project, session);
      const eqCsv = toCSV(eqRows, EQUIPMENT_CSV_HEADERS);
      downloadBlob(`${baseName}_equipment.csv`, eqCsv, 'text/csv');
    }
  }

  function generateGeoJSON() {
    const geojson = observationsToGeoJSON(project, session);
    downloadBlob(`${baseName}_observations.geojson`, JSON.stringify(geojson, null, 2), 'application/geo+json');
    if (equipment.length > 0) {
      const eqGeojson = equipmentToGeoJSON(project, session);
      downloadBlob(`${baseName}_equipment.geojson`, JSON.stringify(eqGeojson, null, 2), 'application/geo+json');
    }
  }

  function generatePDF() {
    if (!window.jspdf) { alert('PDF library failed to load — check your internet connection and try again.'); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const pageWidth = doc.internal.pageSize.getWidth();
    let y = 18;

    doc.setFontSize(8);
    doc.setTextColor(150);
    doc.text('AERIAL ECOLOGY · BATASSIST', 14, 10);

    doc.setFontSize(18);
    doc.setTextColor(20);
    doc.text('Bat Emergence Survey Report', 14, y);
    y += 9;

    doc.setFontSize(11);
    doc.setTextColor(80);
    doc.text(`${project.name} — ${session.label}`, 14, y);
    y += 6;
    doc.setFontSize(9);
    doc.text(`Date: ${session.date}    Generated: ${new Date().toLocaleString()}`, 14, y);
    y += 10;

    // Session details table
    const weather = session.weather || {};
    const weatherEnd = session.weatherEnd || {};
    const detailRows = [
      ['Sunset', session.sunset || '—'],
      ['Survey start', session.surveyStart || '—'],
      ['Survey end', session.surveyEnd || '—'],
      ['Weather (start)', [weather.temp && `${weather.temp}°C`, weather.wind, weather.cloud && `${weather.cloud}% cloud`, weather.precip].filter(Boolean).join(', ') || '—'],
      ['Weather (end)', [weatherEnd.temp && `${weatherEnd.temp}°C`, weatherEnd.wind, weatherEnd.cloud && `${weatherEnd.cloud}% cloud`, weatherEnd.precip].filter(Boolean).join(', ') || '—'],
      ['Session notes', session.notes || '—'],
    ];
    doc.autoTable({
      startY: y, theme: 'plain', styles: { fontSize: 9, cellPadding: 1.5 },
      columnStyles: { 0: { fontStyle: 'bold', cellWidth: 35 } },
      body: detailRows,
    });
    y = doc.lastAutoTable.finalY + 8;

    // Equipment table
    if (equipment.length > 0) {
      if (y > 250) { doc.addPage(); y = 18; }
      doc.setFontSize(12);
      doc.setTextColor(20);
      doc.text('Equipment', 14, y);
      y += 4;
      doc.autoTable({
        startY: y, headStyles: { fillColor: [232,131,58] }, styles: { fontSize: 7 },
        head: [['Unit', 'Kit', 'Bearing', 'Radius (m)', 'FOV (°)', 'Height (m)', 'Activated', 'Added by']],
        body: equipment.map(eq => [
          eq.unitId, (KIT_TYPES[eq.kit]||{}).label || eq.kit,
          eq.bearing != null ? `${Math.round(eq.bearing)}°` : '—',
          eq.radius ?? '—', eq.fov ?? '—', eq.height ?? '—',
          eq.activatedAt ? `${eq.activatedAt}${eq.activatedBy ? ` (${eq.activatedBy})` : ''}` : '—',
          eq.addedBy || '—'
        ]),
      });
      y = doc.lastAutoTable.finalY + 8;
    }

    // Observations table
    if (y > 250) { doc.addPage(); y = 18; }
    doc.setFontSize(12);
    doc.setTextColor(20);
    doc.text(`Observations (${observations.length})`, 14, y);
    y += 4;
    const sortedObs = [...observations].sort((a,b) => (a.time||'').localeCompare(b.time||''));
    doc.autoTable({
      startY: y, headStyles: { fillColor: [232,131,58] }, styles: { fontSize: 8 },
      head: [['Time', 'Species', 'Activity', 'Equipment', 'Surveyor', 'Notes']],
      body: sortedObs.map(obs => {
        const eq = equipment.find(e => e.id === obs.equipmentId);
        const notes = (obs.notes || '') + (obs.addedDuringAnalysis ? ' (post-survey)' : '');
        return [
          obs.time, obs.species, (ACTIVITY_TYPES.find(a=>a.id===obs.activity)||{}).label || obs.activity,
          eq ? eq.unitId : (obs.equipmentUnitId || '—'), obs.addedBy || '—', notes || '—'
        ];
      }),
    });

    doc.save(`${baseName}.pdf`);
  }

  async function handleGenerate() {
    setGenerating(true);
    try {
      if (formats.csv) generateCSV();
      if (formats.geojson) generateGeoJSON();
      if (formats.pdf) generatePDF();
    } catch (e) {
      alert('Something went wrong generating the export: ' + e.message);
    }
    setGenerating(false);
  }

  const anySelected = formats.csv || formats.geojson || formats.pdf;

  return (
    <div className="export-tab">
      <Section title="Export this session">
        <div className="field-hint" style={{marginBottom:12}}>
          Files are named <code>{baseName}_...</code> and download to this device. Photos and reference layers are not included — they stay on each device for now.
        </div>
        <CheckRow label="CSV — observations (spreadsheet)" checked={formats.csv} onChange={()=>toggleFormat('csv')} />
        <CheckRow label="GeoJSON — observations + equipment (for QGIS)" checked={formats.geojson} onChange={()=>toggleFormat('geojson')} />
        <CheckRow label="PDF — summary report" checked={formats.pdf} onChange={()=>toggleFormat('pdf')} />
        <button className="btn btn-primary btn-full" style={{marginTop:14}} disabled={!anySelected || generating} onClick={handleGenerate}>
          <IconDownload/> {generating ? 'Generating...' : 'Download selected'}
        </button>
      </Section>

      <EmailExportSection project={project} session={session} formats={formats} baseName={baseName}
        generateCSV={generateCSV} generateGeoJSON={generateGeoJSON} generatePDF={generatePDF} />

      <Section title="Session summary">
        <div className="field-row">
          <div className="card-sub" style={{fontFamily:'var(--font-mono)'}}>
            {equipment.length} equipment point{equipment.length===1?'':'s'} · {observations.length} observation{observations.length===1?'':'s'}
          </div>
        </div>
      </Section>
    </div>
  );
}
