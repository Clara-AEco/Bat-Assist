/* ============================================================
   SETUP TAB
   ============================================================ */
function SetupTab({ session, onUpdate, project, identity, sync }) {
  const [gpsStatus, setGpsStatus] = useState('idle');
  const [weatherStatus, setWeatherStatus] = useState('idle');
  const fileInputRef = useRef(null);
  const readOnly = !identity.isSuperuser;

  // Debounced push of setup/meta fields to Firebase (excludes large local-only
  // fields like sitePhoto and referenceLayers, and derived arrays)
  const metaPushTimerRef = useRef(null);
  useEffect(() => {
    if (!sync || readOnly) return;
    if (metaPushTimerRef.current) clearTimeout(metaPushTimerRef.current);
    metaPushTimerRef.current = setTimeout(() => {
      const {
        equipment, observations, surveyors, referenceLayers, sitePhoto,
        id, createdAt, metaUpdatedAt, ...meta
      } = session;
      const updatedAt = Date.now();
      sync.pushMeta(meta);
      onUpdate({ metaUpdatedAt: updatedAt });
    }, 1500);
    return () => clearTimeout(metaPushTimerRef.current);
  }, [JSON.stringify({ ...session, sitePhoto: undefined, equipment: undefined, observations: undefined, referenceLayers: undefined })]);

  function getLocationAndSunset() {
    setGpsStatus('loading');
    if (!navigator.geolocation) { setGpsStatus('error'); return; }
    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude, longitude } = pos.coords;
        const sunset = calcSunset(latitude, longitude, session.date);
        onUpdate({ sunset: sunset || session.sunset, siteLat: latitude, siteLon: longitude });
        setGpsStatus('done');
      },
      () => setGpsStatus('error'),
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  function fetchWeather() {
    setWeatherStatus('loading');
    const weather = session.weather || { mode:'auto', temp:'', wind:'', cloud:'', precip:'' };

    function fetchForCoords(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,precipitation,cloud_cover,wind_speed_10m&wind_speed_unit=mph`;
      fetch(url)
        .then(r => r.json())
        .then(data => {
          const c = data.current;
          if (!c) throw new Error('No data');
          onUpdate({ weather: {
            ...weather,
            mode: 'auto',
            temp: String(Math.round(c.temperature_2m)),
            wind: `${Math.round(c.wind_speed_10m)} mph`,
            cloud: String(Math.round(c.cloud_cover)),
            precip: c.precipitation > 0 ? `${c.precipitation} mm` : 'None'
          }});
          setWeatherStatus('done');
        })
        .catch(() => setWeatherStatus('error'));
    }

    if (session.siteLat && session.siteLon) {
      fetchForCoords(session.siteLat, session.siteLon);
    } else if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => fetchForCoords(pos.coords.latitude, pos.coords.longitude),
        () => setWeatherStatus('error'),
        { enableHighAccuracy: true, timeout: 10000 }
      );
    } else {
      setWeatherStatus('error');
    }
  }

  function handlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => onUpdate({ sitePhoto: reader.result });
    reader.readAsDataURL(file);
  }
  const weather = session.weather || { mode:'auto', temp:'', wind:'', cloud:'', precip:'' };

  return (
    <div className="setup-tab">
      {readOnly && (
        <div className="map-banner" style={{marginBottom:12}}>
          <span style={{display:'inline-flex', alignItems:'center', gap:6}}><span style={{width:14,height:14}}><IconLock/></span> View only — coordinators can edit session setup.</span>
        </div>
      )}
      {identity.isSuperuser && <SurveyorAccessSection project={project} session={session} />}
      <fieldset disabled={readOnly} style={{border:'none', padding:0, margin:0}}>
      <Section title="Session name">
        <FieldRow label="Label">
          <input className="text-input" placeholder="e.g. Survey 1, Pre-construction baseline" value={session.label} onChange={e=>onUpdate({label:e.target.value})} />
          <div className="field-hint">Shown in the session list and at the top of the screen — rename to add detail (e.g. dates, phase, equipment used).</div>
        </FieldRow>
      </Section>

      <Section title="Date & timing">
        <FieldRow label="Date">
          <input type="date" className="text-input" value={session.date} onChange={e=>onUpdate({date:e.target.value})} />
        </FieldRow>
        <FieldRow label="Sunset time">
          <div className="inline-field">
            <input type="time" className="text-input" value={session.sunset||''} onChange={e=>onUpdate({sunset:e.target.value})} />
            <button className="btn btn-icon" onClick={getLocationAndSunset} title="Calculate from current location">
              {gpsStatus==='loading' ? <div className="spinner"/> : <IconCrosshair/>}
            </button>
          </div>
          {gpsStatus==='error' && <div className="field-hint field-hint-error">Couldn't get location — enter sunset manually.</div>}
          {gpsStatus==='done' && <div className="field-hint">Calculated from your current location.</div>}
        </FieldRow>
        <FieldRow label="Survey start">
          <div className="inline-field">
            <input type="time" className="text-input" value={session.surveyStart||''} onChange={e=>onUpdate({surveyStart:e.target.value})} />
            <button className="btn btn-secondary btn-small" onClick={()=>onUpdate({surveyStart:nowTimeStr()})}>Now</button>
          </div>
        </FieldRow>
        <FieldRow label="Survey end">
          <div className="inline-field">
            <input type="time" className="text-input" value={session.surveyEnd||''} onChange={e=>onUpdate({surveyEnd:e.target.value})} />
            <button className="btn btn-secondary btn-small" onClick={()=>onUpdate({surveyEnd:nowTimeStr()})}>Now</button>
          </div>
        </FieldRow>
      </Section>

      <Section title="Weather conditions">
        <div className="segmented">
          <button className={`segment ${weather.mode==='auto'?'segment-active':''}`} onClick={()=>onUpdate({weather:{...weather, mode:'auto'}})}>
            <IconCloud/> Auto
          </button>
          <button className={`segment ${weather.mode==='manual'?'segment-active':''}`} onClick={()=>onUpdate({weather:{...weather, mode:'manual'}})}>
            Manual
          </button>
        </div>
        {weather.mode==='auto' && (
          <div style={{marginTop:8}}>
            <button className="btn btn-secondary btn-full btn-small" onClick={fetchWeather} disabled={weatherStatus==='loading'}>
              {weatherStatus==='loading' ? <div className="spinner"/> : <IconCloud/>}
              {weatherStatus==='loading' ? 'Fetching...' : 'Fetch current weather'}
            </button>
            {weatherStatus==='done' && <div className="field-hint">Updated from current conditions at this location. Fields below remain editable.</div>}
            {weatherStatus==='error' && <div className="field-hint field-hint-error">Couldn't fetch weather — check connection, or enter manually below.</div>}
            {weatherStatus==='idle' && <div className="field-hint">Needs a network connection. Fields below remain editable as fallback.</div>}
          </div>
        )}
        <FieldRow label="Temperature (°C)">
          <input type="number" className="text-input" placeholder="e.g. 14" value={weather.temp} onChange={e=>onUpdate({weather:{...weather, temp:e.target.value}})} />
        </FieldRow>
        <FieldRow label="Wind (Beaufort or mph)">
          <input className="text-input" placeholder="e.g. Light breeze / 8mph" value={weather.wind} onChange={e=>onUpdate({weather:{...weather, wind:e.target.value}})} />
        </FieldRow>
        <FieldRow label="Cloud cover (%)">
          <input type="number" className="text-input" placeholder="e.g. 25" value={weather.cloud} onChange={e=>onUpdate({weather:{...weather, cloud:e.target.value}})} />
        </FieldRow>
        <FieldRow label="Precipitation">
          <input className="text-input" placeholder="e.g. None / Light rain" value={weather.precip} onChange={e=>onUpdate({weather:{...weather, precip:e.target.value}})} />
        </FieldRow>
      </Section>

      <Section title="Site photo">
        {session.sitePhoto ? (
          <div className="photo-preview">
            <img src={session.sitePhoto} alt="Site" />
            <button className="btn btn-secondary btn-small" onClick={()=>onUpdate({sitePhoto:null})}>Remove</button>
          </div>
        ) : (
          <button className="btn btn-secondary btn-full" onClick={()=>fileInputRef.current && fileInputRef.current.click()}>
            <IconCamera/> Add photo
          </button>
        )}
        <input ref={fileInputRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handlePhoto} />
      </Section>

      <Section title="Session notes">
        <textarea className="text-input textarea" placeholder="General notes for this session..." value={session.notes||''} onChange={e=>onUpdate({notes:e.target.value})} rows={3} />
      </Section>
      </fieldset>

      {identity.isSuperuser && <CloseSessionSection session={session} onUpdate={onUpdate} />}
    </div>
  );
}

function SurveyorAccessSection({ project, session }) {
  const qrRef = useRef(null);
  const [copied, setCopied] = useState(false);
  const [syncCheck, setSyncCheck] = useState('checking'); // checking | ok | missing | unavailable
  const joinUrl = `${window.location.origin}${window.location.pathname}?join=${project.id}.${session.id}`;

  useEffect(() => {
    if (!qrRef.current || !window.QRCode) return;
    qrRef.current.innerHTML = '';
    new window.QRCode(qrRef.current, {
      text: joinUrl,
      width: 160,
      height: 160,
      colorDark: '#14171a',
      colorLight: '#ffffff',
      correctLevel: window.QRCode.CorrectLevel.M
    });
  }, [joinUrl]);

  useEffect(() => {
    if (!fbDb) { setSyncCheck('unavailable'); return; }
    setSyncCheck('checking');
    fbDb.ref(`sync/projects/${project.id}/sessions/${session.id}`).once('value')
      .then(snap => setSyncCheck(snap.exists() ? 'ok' : 'missing'))
      .catch(() => setSyncCheck('unavailable'));
  }, [project.id, session.id]);

  function copyLink() {
    navigator.clipboard?.writeText(joinUrl).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    }).catch(() => {});
  }

  return (
    <Section title="Surveyor access">
      <div className="field-hint" style={{marginBottom:10}}>
        Share this QR code or link with surveyors. Opening it takes them straight to this session's Map and Observe tabs — they'll be asked for their name on first use.
      </div>
      <div style={{display:'flex', justifyContent:'center', background:'#fff', borderRadius:8, padding:12, marginBottom:10}}>
        <div ref={qrRef} />
      </div>
      <div className="inline-field">
        <input className="text-input" readOnly value={joinUrl} style={{fontFamily:'var(--font-mono)', fontSize:12}} onClick={e=>e.target.select()} />
        <button className="btn btn-secondary btn-small" onClick={copyLink}><IconCopy/> {copied ? 'Copied' : 'Copy'}</button>
      </div>
      <div style={{marginTop:8}}>
        {syncCheck === 'checking' && <div className="field-hint">Checking link is reachable...</div>}
        {syncCheck === 'ok' && <div className="field-hint" style={{color:'var(--teal)'}}>✓ This session is reachable via the link above.</div>}
        {syncCheck === 'missing' && (
          <div>
            <div className="field-hint field-hint-error">This session hasn't synced yet — the link may not work until it does.</div>
            <button className="btn btn-secondary btn-small btn-full" style={{marginTop:6}} onClick={()=>{
              if (fbDb) {
                fbDb.ref(`sync/projects/${project.id}`).update({ name: project.name, archived: !!project.archived, createdAt: project.createdAt, updatedAt: Date.now() });
                fbDb.ref(`sync/projects/${project.id}/sessions/${session.id}`).update({ label: session.label, date: session.date, status: session.status, createdAt: session.createdAt, updatedAt: Date.now() })
                  .then(() => setSyncCheck('ok')).catch(() => setSyncCheck('unavailable'));
              }
            }}>Retry sync</button>
          </div>
        )}
        {syncCheck === 'unavailable' && <div className="field-hint field-hint-error">Couldn't reach the sync server — check your internet connection.</div>}
      </div>
    </Section>
  );
}

function CloseSessionSection({ session, onUpdate }) {
  const [showCloseForm, setShowCloseForm] = useState(false);
  const weatherEnd = session.weatherEnd || { temp:'', wind:'', cloud:'', precip:'' };

  if (session.status === 'closed') {
    return (
      <Section title="Session status">
        <div className="field-hint" style={{marginBottom:10}}>This session is closed. Data is preserved — reopen if you need to add or correct anything.</div>
        <button className="btn btn-secondary btn-full" onClick={()=>onUpdate({status:'active'})}>Reopen session</button>
      </Section>
    );
  }

  function fetchEndWeather() {
    function fetchForCoords(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,precipitation,cloud_cover,wind_speed_10m&wind_speed_unit=mph`;
      fetch(url)
        .then(r => r.json())
        .then(data => {
          const c = data.current;
          if (!c) throw new Error('No data');
          onUpdate({ weatherEnd: {
            temp: String(Math.round(c.temperature_2m)),
            wind: `${Math.round(c.wind_speed_10m)} mph`,
            cloud: String(Math.round(c.cloud_cover)),
            precip: c.precipitation > 0 ? `${c.precipitation} mm` : 'None'
          }});
        })
        .catch(() => alert('Could not fetch weather — enter manually below.'));
    }
    if (session.siteLat && session.siteLon) {
      fetchForCoords(session.siteLat, session.siteLon);
    } else if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => fetchForCoords(pos.coords.latitude, pos.coords.longitude),
        () => alert('Could not get location for weather — enter manually below.'),
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }
  }

  return (
    <Section title="Close session">
      <div className="field-hint" style={{marginBottom:10}}>
        Closing a session marks it as finished and records end-of-survey weather. You can reopen it later if needed — data is never deleted.
      </div>
      {!showCloseForm ? (
        <button className="btn btn-primary btn-full" onClick={()=>setShowCloseForm(true)}>Close session</button>
      ) : (
        <div>
          <div className="field-label" style={{marginBottom:8}}>End-of-survey weather</div>
          <button className="btn btn-secondary btn-full btn-small" onClick={fetchEndWeather} style={{marginBottom:10}}>
            <IconCloud/> Fetch current weather
          </button>
          <FieldRow label="Temperature (°C)">
            <input type="number" className="text-input" placeholder="e.g. 11" value={weatherEnd.temp} onChange={e=>onUpdate({weatherEnd:{...weatherEnd, temp:e.target.value}})} />
          </FieldRow>
          <FieldRow label="Wind (Beaufort or mph)">
            <input className="text-input" placeholder="e.g. Calm" value={weatherEnd.wind} onChange={e=>onUpdate({weatherEnd:{...weatherEnd, wind:e.target.value}})} />
          </FieldRow>
          <FieldRow label="Cloud cover (%)">
            <input type="number" className="text-input" placeholder="e.g. 60" value={weatherEnd.cloud} onChange={e=>onUpdate({weatherEnd:{...weatherEnd, cloud:e.target.value}})} />
          </FieldRow>
          <FieldRow label="Precipitation">
            <input className="text-input" placeholder="e.g. None" value={weatherEnd.precip} onChange={e=>onUpdate({weatherEnd:{...weatherEnd, precip:e.target.value}})} />
          </FieldRow>
          <div className="modal-actions" style={{marginTop:14}}>
            <button className="btn btn-secondary" onClick={()=>setShowCloseForm(false)}>Cancel</button>
            <button className="btn btn-primary" onClick={()=>{ onUpdate({status:'closed'}); setShowCloseForm(false); }}>Confirm close</button>
          </div>
        </div>
      )}
    </Section>
  );
}

/* ============================================================
   MAP TAB
   ============================================================ */
function MapTab({ session, onUpdate, identity, sync, myAlertActive }) {
  const mapRef = useRef(null);
  const mapInstanceRef = useRef(null);
  const layersRef = useRef({ equipment: [], observations: [], reference: [], surveyor: null, otherSurveyors: {} });
  const [gpsPos, setGpsPos] = useState(null);
  const [editingEquipment, setEditingEquipment] = useState(null);
  const [placementMode, setPlacementMode] = useState(false);
  const [pendingCoords, setPendingCoords] = useState(null);
  const [pendingReferenceLayer, setPendingReferenceLayer] = useState(null);
  const placementModeRef = useRef(false);
  const fileRef = useRef(null);

  const equipment = session.equipment || [];
  const observations = session.observations || [];
  const referenceLayers = session.referenceLayers || [];

  useEffect(() => { placementModeRef.current = placementMode; }, [placementMode]);

  useEffect(() => {
    if (mapInstanceRef.current || !mapRef.current) return;
    const L = window.L;
    if (!L) return;
    const initialCenter = (session.siteLat && session.siteLon) ? [session.siteLat, session.siteLon] : [51.5, -0.1];
    const map = L.map(mapRef.current, { zoomControl: true }).setView(initialCenter, 17);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 21, attribution: '© OpenStreetMap' }).addTo(map);
    map.on('click', (e) => {
      if (placementModeRef.current) setPendingCoords([e.latlng.lat, e.latlng.lng]);
    });
    mapInstanceRef.current = map;
    setTimeout(() => map.invalidateSize(), 100);
    return () => { map.remove(); mapInstanceRef.current = null; };
  }, []);

  const hasAutoCenteredRef = useRef(false);
  const lastPushedPosRef = useRef(null);
  const lastPushTimeRef = useRef(0);

  useEffect(() => {
    if (!navigator.geolocation) return;
    const watchId = navigator.geolocation.watchPosition(
      pos => {
        const coords = [pos.coords.latitude, pos.coords.longitude];
        setGpsPos(coords);
        if (!hasAutoCenteredRef.current && mapInstanceRef.current && !(session.siteLat && session.siteLon)) {
          mapInstanceRef.current.setView(coords, 18);
          hasAutoCenteredRef.current = true;
        }
        // Throttled push to Firebase for "near real-time" surveyor position
        // (H&S visibility): every 20s, or immediately if moved >10m
        if (sync) {
          const now = Date.now();
          const last = lastPushedPosRef.current;
          const movedFar = last && haversine(last[0], last[1], coords[0], coords[1]) > 10;
          if (!last || movedFar || (now - lastPushTimeRef.current) > 20000) {
            sync.pushSurveyorPosition(coords[0], coords[1]);
            lastPushedPosRef.current = coords;
            lastPushTimeRef.current = now;
          }
        }
      },
      () => {},
      { enableHighAccuracy: true, maximumAge: 5000 }
    );
    return () => navigator.geolocation.clearWatch(watchId);
  }, []);

  useEffect(() => {
    const map = mapInstanceRef.current, L = window.L;
    if (!map || !L || !gpsPos) return;
    const existing = layersRef.current.surveyor;
    if (existing && existing._alertState === !!myAlertActive) {
      existing.setLatLng(gpsPos);
    } else {
      if (existing) map.removeLayer(existing);
      const markerClass = myAlertActive ? 'surveyor-dot surveyor-dot-alert' : 'surveyor-dot';
      const icon = L.divIcon({ className:'', html:`<div class="${markerClass}"></div>`, iconSize:[20,20], iconAnchor:[10,10] });
      const marker = L.marker(gpsPos, { icon, zIndexOffset: 1000 }).addTo(map);
      marker._alertState = !!myAlertActive;
      layersRef.current.surveyor = marker;
    }
  }, [gpsPos, myAlertActive]);

  // Render other surveyors' last-known positions (from sync)
  useEffect(() => {
    const map = mapInstanceRef.current, L = window.L;
    if (!map || !L || !sync) return;
    const others = sync.otherSurveyors || {};
    const existing = layersRef.current.otherSurveyors || {};

    // Remove markers for surveyors no longer present
    Object.keys(existing).forEach(name => {
      if (!others[name]) {
        map.removeLayer(existing[name]);
        delete existing[name];
      }
    });

    Object.entries(others).forEach(([name, info]) => {
      if (info.lat == null || info.lon == null) return;
      const pos = [info.lat, info.lon];
      const ageMin = Math.round((Date.now() - (info.lastUpdate || 0)) / 60000);
      const ageLabel = ageMin < 1 ? 'just now' : `${ageMin}m ago`;
      const isAlert = !!(info.alert && info.alert.active);
      const tooltipText = isAlert ? `${name} · ALERT · ${ageLabel}` : `${name} · ${ageLabel}`;

      if (existing[name] && existing[name]._alertState === isAlert) {
        existing[name].setLatLng(pos);
        existing[name].setTooltipContent(tooltipText);
      } else {
        if (existing[name]) map.removeLayer(existing[name]);
        const markerClass = isAlert ? 'surveyor-dot surveyor-dot-alert' : 'surveyor-dot surveyor-dot-other';
        const icon = L.divIcon({
          className: '',
          html: `<div class="${markerClass}"><span class="surveyor-label">${name}${isAlert ? ' ⚠' : ''}</span></div>`,
          iconSize: [20, 20], iconAnchor: [10, 10]
        });
        const marker = L.marker(pos, { icon, zIndexOffset: isAlert ? 1100 : 900 }).addTo(map);
        marker.bindTooltip(tooltipText, { permanent: false });
        marker._alertState = isAlert;
        existing[name] = marker;
      }
    });
    layersRef.current.otherSurveyors = existing;
  }, [sync && sync.otherSurveyors]);

  useEffect(() => {
    const map = mapInstanceRef.current, L = window.L;
    if (!map || !L) return;
    layersRef.current.equipment.forEach(l => map.removeLayer(l));
    layersRef.current.equipment = [];
    equipment.forEach(eq => {
      const kitDef = KIT_TYPES[eq.kit] || KIT_TYPES.OTHER;
      const color = kitDef.color;
      if (kitDef.shape === 'wedge' && eq.fov && eq.radius) {
        const wedge = wedgePolygon(eq.lat, eq.lon, eq.bearing||0, eq.fov, eq.radius);
        const poly = L.polygon(wedge, { color, weight:1.5, fillColor:color, fillOpacity:0.22, opacity:0.7 }).addTo(map);
        poly.on('click', () => setEditingEquipment(eq));
        layersRef.current.equipment.push(poly);
      }
      const markerHtml = kitDef.shape === 'square'
        ? `<div class="eq-marker eq-marker-square" style="background:${color}"></div>`
        : `<div class="eq-marker eq-marker-circle" style="background:${color}"></div>`;
      const icon = L.divIcon({ className:'', html: markerHtml, iconSize:[18,18], iconAnchor:[9,9] });
      const marker = L.marker([eq.lat, eq.lon], { icon, zIndexOffset: 500 }).addTo(map);
      marker.bindTooltip(eq.activatedAt ? `${eq.unitId || kitDef.label} · rec ${eq.activatedAt}` : (eq.unitId || kitDef.label), { permanent: false });
      marker.on('click', () => setEditingEquipment(eq));
      layersRef.current.equipment.push(marker);
    });
  }, [equipment]);

  useEffect(() => {
    const map = mapInstanceRef.current, L = window.L;
    if (!map || !L) return;
    layersRef.current.observations.forEach(l => map.removeLayer(l));
    layersRef.current.observations = [];
    observations.forEach(obs => {
      if (obs.lat == null || obs.lon == null) return;
      const color = ACTIVITY_COLORS[obs.activity] || ACTIVITY_COLORS.unknown;
      const isEmergence = obs.activity === 'emergence';
      const markerHtml = isEmergence
        ? `<div class="obs-marker-star" style="background:${color}"></div>`
        : `<div class="obs-marker" style="background:${color}"></div>`;
      const iconSize = isEmergence ? [18,18] : [14,14];
      const iconAnchor = isEmergence ? [9,9] : [7,7];
      const icon = L.divIcon({ className:'', html: markerHtml, iconSize, iconAnchor });
      const marker = L.marker([obs.lat, obs.lon], { icon, zIndexOffset: 800 }).addTo(map);
      marker.bindTooltip(`${obs.species} — ${obs.time}`, { permanent: false });
      layersRef.current.observations.push(marker);
    });
  }, [observations]);

  useEffect(() => {
    const map = mapInstanceRef.current, L = window.L;
    if (!map || !L) return;
    layersRef.current.reference.forEach(l => map.removeLayer(l));
    layersRef.current.reference = [];
    referenceLayers.forEach(layer => {
      try {
        const gj = L.geoJSON(layer.data, {
          style: { color:'#5BA3D0', weight:1.5, fillOpacity:0.05, dashArray:'4,4' },
          pointToLayer: (f, latlng) => L.circleMarker(latlng, { radius:4, color:'#5BA3D0', weight:1 })
        }).addTo(map);
        gj.eachLayer(l => {
          const props = (l.feature && l.feature.properties) || {};
          const label = layer.labelField ? props[layer.labelField] : (props.label || props.name || props.building || props.id || '');
          if (label) l.bindTooltip(String(label), { permanent: false });
        });
        layersRef.current.reference.push(gj);
      } catch (e) { console.error('Failed to render reference layer', e); }
    });
  }, [referenceLayers]);

  function centerOnGPS() {
    if (gpsPos && mapInstanceRef.current) mapInstanceRef.current.setView(gpsPos, mapInstanceRef.current.getZoom());
  }
  function addEquipmentAt(coords) {
    setPendingCoords(coords);
    setPlacementMode(false);
  }
  function saveEquipment(eq) {
    const exists = equipment.find(e => e.id === eq.id);
    const stamped = exists
      ? { ...eq, lastModifiedBy: identity.name }
      : { ...eq, addedBy: identity.name, lastModifiedBy: identity.name };
    const updated = exists ? equipment.map(e => e.id===eq.id ? stamped : e) : [...equipment, stamped];
    onUpdate({ equipment: updated });
    setEditingEquipment(null);
    setPendingCoords(null);
    if (sync) {
      const { photo, ...syncable } = stamped; // photo stays local-only
      sync.pushEquipment(syncable);
    }
  }
  function deleteEquipment(id) {
    onUpdate({ equipment: equipment.filter(e => e.id !== id) });
    setEditingEquipment(null);
    if (sync) sync.removeEquipment(id);
  }
  function handleGeoJSONImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        const features = data.features || [];
        const looksLikeEquipment = features.length>0 && features[0].properties && ('unit_id' in features[0].properties || 'kit' in features[0].properties);
        if (looksLikeEquipment) {
          const imported = features.map(f => {
            const p = f.properties || {};
            const [lon, lat] = f.geometry.coordinates;
            const kitLabel = (p.kit || '').toLowerCase();
            let kitKey = 'OTHER';
            if (kitLabel.includes('m4t')) kitKey = 'DJI_M4T';
            else if (kitLabel.includes('m30t')) kitKey = 'DJI_M30T';
            else if (kitLabel.includes('tk612') || kitLabel.includes('guide')) kitKey = 'TK612';
            else if (kitLabel.includes('acoustic')) kitKey = 'ACOUSTIC';
            return {
              id: uid(), unitId: p.unit_id || p.site || 'Imported', kit: kitKey,
              lat, lon, bearing: Number(p.bearing)||0,
              fov: Number(p.fov_deg) || KIT_TYPES[kitKey].fov || 45,
              radius: Number(p.radius_m) || KIT_TYPES[kitKey].defaultRadius || 50,
              height: p.height_m != null ? Number(p.height_m) : null,
              notes: p.notes || ''
            };
          });
          onUpdate({ equipment: [...equipment, ...imported] });
          alert(`Imported ${imported.length} equipment point(s).`);
        } else {
          // Reference layer (boundary, building polygons, etc.) — let the
          // user choose which property to use as the on-map label
          const propKeys = features.length > 0 ? Object.keys(features[0].properties || {}) : [];
          if (propKeys.length === 0) {
            onUpdate({ referenceLayers: [...referenceLayers, { id: uid(), name: file.name, data, labelField: null }] });
            alert(`Added "${file.name}" as a reference layer.`);
          } else {
            setPendingReferenceLayer({ name: file.name, data, propKeys });
          }
        }
      } catch (err) { alert('Could not parse GeoJSON file: ' + err.message); }
    };
    reader.readAsText(file);
  }

  return (
    <div className="map-tab">
      <div className="map-toolbar">
        <button className="btn btn-secondary btn-small" onClick={()=>fileRef.current && fileRef.current.click()}>
          <IconUpload/> Import GeoJSON
        </button>
        <input ref={fileRef} type="file" accept=".geojson,.json" style={{display:'none'}} onChange={handleGeoJSONImport} />
        <button className="btn btn-icon btn-small" onClick={centerOnGPS} title="Centre on my location" disabled={!gpsPos}>
          <IconCrosshair/>
        </button>
      </div>

      <div className="map-container" ref={mapRef} />

      {placementMode && (
        <div className="map-banner">
          Tap the map to place equipment — or
          <button className="link-btn" onClick={()=>setPlacementMode(false)}>cancel</button>
        </div>
      )}

      <div className="map-actions">
        <button className="btn btn-primary btn-full" onClick={()=>{ if (gpsPos) addEquipmentAt(gpsPos); else setPlacementMode(true); }}>
          <IconPlus/> Add equipment {gpsPos ? 'at my location' : '(tap map)'}
        </button>
        {gpsPos && (
          <button className="btn btn-secondary btn-small btn-full" onClick={()=>setPlacementMode(true)} style={{marginTop:6}}>
            Or tap map to choose position
          </button>
        )}
        {!gpsPos && (
          <div className="field-hint" style={{marginTop:6, textAlign:'center'}}>Waiting for GPS signal — you can still tap the map to place equipment.</div>
        )}
      </div>

      <div className="legend">
        <div className="legend-title">Map key</div>
        <div className="legend-grid">
          {Object.entries(KIT_TYPES).map(([key, kit]) => (
            <div className="legend-item" key={key}>
              <span className={`legend-swatch ${kit.shape==='square'?'legend-square':'legend-circle'}`} style={{background:kit.color}} />
              {kit.label}
            </div>
          ))}
          <div className="legend-item">
            <span className="legend-swatch legend-circle" style={{background:'#999', border:'2px solid #fff'}} />
            Observation (colour = activity)
          </div>
          <div className="legend-item">
            <span className="legend-swatch" style={{background:ACTIVITY_COLORS.emergence, clipPath:'polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)'}} />
            Emergence
          </div>
          <div className="legend-item">
            <span className="legend-swatch legend-circle surveyor-dot-mini" />
            Your position
          </div>
          <div className="legend-item">
            <span className="legend-swatch legend-circle" style={{background:'var(--accent)', border:'2px solid #fff'}} />
            Other surveyors
          </div>
          <div className="legend-item">
            <span className="legend-swatch legend-circle" style={{background:'var(--danger)', border:'2px solid #fff'}} />
            Alert — needs help
          </div>
        </div>
      </div>

      {(editingEquipment || pendingCoords) && (
        <EquipmentForm
          equipment={editingEquipment}
          coords={editingEquipment ? [editingEquipment.lat, editingEquipment.lon] : pendingCoords}
          observations={observations}
          identity={identity}
          onSave={saveEquipment}
          onDelete={editingEquipment ? ()=>deleteEquipment(editingEquipment.id) : null}
          onClose={()=>{ setEditingEquipment(null); setPendingCoords(null); }}
        />
      )}

      {pendingReferenceLayer && (
        <ReferenceLayerImportModal
          pending={pendingReferenceLayer}
          onConfirm={(labelField) => {
            onUpdate({ referenceLayers: [...referenceLayers, { id: uid(), name: pendingReferenceLayer.name, data: pendingReferenceLayer.data, labelField }] });
            setPendingReferenceLayer(null);
          }}
          onClose={()=>setPendingReferenceLayer(null)}
        />
      )}
    </div>
  );
}

function ReferenceLayerImportModal({ pending, onConfirm, onClose }) {
  // Guess a sensible default label field
  const guess = pending.propKeys.find(k => /ref|name|label|building|id/i.test(k)) || pending.propKeys[0];
  const [labelField, setLabelField] = useState(guess);

  return (
    <Modal title="Import reference layer" onClose={onClose}>
      <p className="modal-text" style={{marginBottom:14}}>
        "{pending.name}" looks like a reference layer (e.g. site boundary or building polygons) — it'll be shown on the map as a non-editable overlay.
      </p>
      <FieldRow label="Label features using">
        <select className="text-input" value={labelField || ''} onChange={e=>setLabelField(e.target.value || null)}>
          <option value="">— No label —</option>
          {pending.propKeys.map(k => <option key={k} value={k}>{k}</option>)}
        </select>
        <div className="field-hint">e.g. a "building_ref" or "BNG_ref" field — shown when tapping a shape on the map.</div>
      </FieldRow>
      <div className="modal-actions">
        <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn-primary" onClick={()=>onConfirm(labelField)}>Add layer</button>
      </div>
    </Modal>
  );
}

function EquipmentForm({ equipment, coords, observations, identity, onSave, onDelete, onClose }) {
  const isEdit = !!equipment;
  const [unitId, setUnitId] = useState(equipment ? equipment.unitId : '');
  const [kit, setKit] = useState(equipment ? equipment.kit : 'DJI_M4T');
  const [bearing, setBearing] = useState(equipment ? equipment.bearing : 0);
  const [fov, setFov] = useState(equipment ? equipment.fov : KIT_TYPES.DJI_M4T.fov);
  const [radius, setRadius] = useState(equipment ? equipment.radius : KIT_TYPES.DJI_M4T.defaultRadius);
  const [height, setHeight] = useState(equipment && equipment.height!=null ? equipment.height : '');
  const [notes, setNotes] = useState(equipment ? (equipment.notes||'') : '');
  const [photo, setPhoto] = useState(equipment ? (equipment.photo||null) : null);
  const [activatedAt, setActivatedAt] = useState(equipment ? (equipment.activatedAt || '') : '');
  const [showAnnotated, setShowAnnotated] = useState(false);
  const kitDef = KIT_TYPES[kit];
  const photoInputRef = useRef(null);
  const taggedObservations = (observations || []).filter(o => o.equipmentId === (equipment && equipment.id) && o.photoTap);

  function handleKitChange(newKit) {
    setKit(newKit);
    const def = KIT_TYPES[newKit];
    if (def.fov != null) setFov(def.fov);
    if (def.defaultRadius != null) setRadius(def.defaultRadius);
  }
  function handlePhotoUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => setPhoto(reader.result);
    reader.readAsDataURL(file);
  }
  function handleSave() {
    const wasActivated = equipment && equipment.activatedAt;
    onSave({
      id: equipment ? equipment.id : uid(),
      unitId: unitId.trim() || kitDef.label,
      kit, lat: coords[0], lon: coords[1],
      bearing: Number(bearing),
      fov: kitDef.shape==='square' ? null : Number(fov),
      radius: kitDef.shape==='square' ? null : Number(radius),
      height: height==='' ? null : Number(height),
      notes, photo,
      activatedAt: activatedAt || null,
      activatedBy: activatedAt ? (activatedAt === (equipment && equipment.activatedAt) ? equipment.activatedBy : identity.name) : null,
    });
  }

  return (
    <Modal title={isEdit?'Edit equipment':'Add equipment'} onClose={onClose}>
      <FieldRow label="Unit name">
        <input className="text-input" placeholder="e.g. Aria, Blue, Point 3" value={unitId} onChange={e=>setUnitId(e.target.value)} autoFocus />
      </FieldRow>
      <FieldRow label="Kit type">
        <select className="text-input" value={kit} onChange={e=>handleKitChange(e.target.value)}>
          {Object.entries(KIT_TYPES).map(([key,def]) => <option key={key} value={key}>{def.label}</option>)}
        </select>
      </FieldRow>
      {kitDef.shape !== 'square' && (
        <React.Fragment>
          <FieldRow label="Bearing (° from North)">
            <BearingDial value={bearing} onChange={setBearing} />
          </FieldRow>
          <FieldRow label={`Field of view (°)${kit!=='OTHER'?' — fixed for this kit':''}`}>
            <input type="number" className="text-input" value={fov} onChange={e=>setFov(e.target.value)} disabled={kit!=='OTHER'} />
          </FieldRow>
          <FieldRow label="Radius (m)">
            <input type="number" className="text-input" value={radius} onChange={e=>setRadius(e.target.value)} />
            <div className="field-hint">Default for this kit: {KIT_TYPES[kit].defaultRadius ?? 'manual'}m — adjustable on site.</div>
          </FieldRow>
        </React.Fragment>
      )}
      <FieldRow label="Flight height (m) — optional, for future viewshed">
        <input type="number" className="text-input" placeholder="Leave blank if N/A" value={height} onChange={e=>setHeight(e.target.value)} />
      </FieldRow>
      <FieldRow label="Activated (recording started)">
        <div className="inline-field">
          <input type="time" className="text-input" value={activatedAt} onChange={e=>setActivatedAt(e.target.value)} />
          <button className="btn btn-secondary btn-small" onClick={()=>setActivatedAt(nowTimeStr())}>Now</button>
          {activatedAt && <button className="btn btn-icon btn-small" onClick={()=>setActivatedAt('')} aria-label="Clear"><IconX/></button>}
        </div>
        <div className="field-hint">
          Tap "Now" the moment you press record on this unit — cameras often run on their own clock, so this helps correct for drift when reviewing footage later.
          {equipment && equipment.activatedAt && equipment.activatedBy && <span> Last set by {equipment.activatedBy}.</span>}
        </div>
      </FieldRow>
      <FieldRow label="Notes">
        <textarea className="text-input textarea" rows={2} value={notes} onChange={e=>setNotes(e.target.value)} />
      </FieldRow>
      <FieldRow label="Reference photo — optional, lets surveyors tap a spot on this photo to log an observation (e.g. an emergence point on a gable end)">
        {photo ? (
          <div className="photo-preview">
            <img src={photo} alt="Equipment reference" />
            <button className="btn btn-secondary btn-small" onClick={()=>setPhoto(null)}>Remove photo</button>
          </div>
        ) : (
          <button className="btn btn-secondary btn-full" onClick={()=>photoInputRef.current && photoInputRef.current.click()}>
            <IconCamera/> Add reference photo
          </button>
        )}
        <input ref={photoInputRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handlePhotoUpload} />
        {photo && taggedObservations.length > 0 && (
          <button className="btn btn-secondary btn-full" style={{marginTop:8}} onClick={()=>setShowAnnotated(true)}>
            View annotated photo ({taggedObservations.length} marked)
          </button>
        )}
      </FieldRow>
      {showAnnotated && (
        <AnnotatedPhotoView photo={photo} observations={taggedObservations} onClose={()=>setShowAnnotated(false)} />
      )}
      <div className="field-hint" style={{marginBottom:12}}>
        Position: {coords[0].toFixed(6)}, {coords[1].toFixed(6)}
        {equipment && equipment.addedBy && <span> · Added by {equipment.addedBy}{equipment.lastModifiedBy && equipment.lastModifiedBy !== equipment.addedBy ? `, last edited by ${equipment.lastModifiedBy}` : ''}</span>}
      </div>
      <div className="modal-actions">
        {onDelete && <button className="btn btn-danger" onClick={onDelete}><IconTrash/></button>}
        <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn-primary" onClick={handleSave}>Save</button>
      </div>
    </Modal>
  );
}

function BearingDial({ value, onChange }) {
  const dialRef = useRef(null);
  const [dragging, setDragging] = useState(false);

  function angleFromEvent(e) {
    const rect = dialRef.current.getBoundingClientRect();
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    let deg = Math.atan2(clientX-cx, -(clientY-cy)) * 180/Math.PI;
    return Math.round((deg+360)%360);
  }
  function handleDown(e) { setDragging(true); onChange(angleFromEvent(e)); }
  function handleMove(e) { if (dragging) { e.preventDefault(); onChange(angleFromEvent(e)); } }
  function handleUp() { setDragging(false); }

  useEffect(() => {
    if (!dragging) return;
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleUp);
    window.addEventListener('touchmove', handleMove, { passive:false });
    window.addEventListener('touchend', handleUp);
    return () => {
      window.removeEventListener('mousemove', handleMove);
      window.removeEventListener('mouseup', handleUp);
      window.removeEventListener('touchmove', handleMove);
      window.removeEventListener('touchend', handleUp);
    };
  }, [dragging]);

  function step(delta) { onChange(((Number(value)+delta)%360+360)%360); }

  return (
    <div className="bearing-dial-wrap">
      <div className="bearing-dial" ref={dialRef} onMouseDown={handleDown} onTouchStart={handleDown}>
        <div className="dial-face">
          <span className="dial-n">N</span>
          <div className="dial-needle" style={{transform:`rotate(${value}deg)`}}>
            <div className="dial-needle-tip" />
          </div>
          <div className="dial-center" />
        </div>
      </div>
      <div className="dial-controls">
        <div className="dial-readout">{Math.round(value)}°</div>
        <div className="dial-steppers">
          <button className="btn btn-secondary btn-small" onClick={()=>step(-10)}>-10</button>
          <button className="btn btn-secondary btn-small" onClick={()=>step(-1)}>-1</button>
          <button className="btn btn-secondary btn-small" onClick={()=>step(1)}>+1</button>
          <button className="btn btn-secondary btn-small" onClick={()=>step(10)}>+10</button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   OBSERVE TAB
   ============================================================ */
function ObserveTab({ session, onUpdate, identity, sync }) {
  const [showForm, setShowForm] = useState(false);
  const [editingObservation, setEditingObservation] = useState(null);
  const [gpsPos, setGpsPos] = useState(null);
  const [analysisMode, setAnalysisMode] = useState(false);
  const observations = session.observations || [];
  const equipment = session.equipment || [];
  const isClosed = session.status === 'closed';
  const canAdd = !isClosed || analysisMode;

  useEffect(() => {
    if (!navigator.geolocation) return;
    const watchId = navigator.geolocation.watchPosition(
      pos => setGpsPos([pos.coords.latitude, pos.coords.longitude]),
      () => {},
      { enableHighAccuracy: true, maximumAge: 5000 }
    );
    return () => navigator.geolocation.clearWatch(watchId);
  }, []);

  function saveObservation(obs) {
    const exists = observations.find(o => o.id === obs.id);
    const tagged = (isClosed && analysisMode && !exists) ? { ...obs, addedDuringAnalysis: true } : obs;
    const stamped = exists ? { ...tagged, lastModifiedBy: identity.name } : { ...tagged, addedBy: identity.name, lastModifiedBy: identity.name };
    const updated = exists ? observations.map(o => o.id===obs.id ? stamped : o) : [...observations, stamped];
    onUpdate({ observations: updated, lastEquipmentId: obs.equipmentId });
    setShowForm(false);
    setEditingObservation(null);
    if (sync) sync.pushObservation(stamped);
  }
  function deleteObservation(id) {
    onUpdate({ observations: observations.filter(o => o.id !== id) });
    if (sync) sync.removeObservation(id);
  }
  const sorted = [...observations].sort((a,b) => (a.time||'').localeCompare(b.time||''));

  return (
    <div className="observe-tab">
      {isClosed && !analysisMode && (
        <div className="map-banner" style={{marginBottom:12}}>
          This session is closed. Adding observations is locked to protect survey data —
          <button className="link-btn" onClick={()=>{
            if (confirm('Unlock this closed session to add post-survey analysis notes?\n\nEntries added now will be flagged as "added during analysis" in the export, separate from field data.')) {
              setAnalysisMode(true);
            }
          }}>unlock for analysis</button>
        </div>
      )}
      {isClosed && analysisMode && (
        <div className="map-banner" style={{marginBottom:12, background:'var(--teal-dim)', color:'var(--teal)'}}>
          Analysis mode — new entries will be flagged as added after the survey closed.
        </div>
      )}
      <button className="btn btn-primary btn-full" onClick={()=>setShowForm(true)} style={{marginBottom:12}} disabled={!canAdd}>
        <IconPlus/> Add observation
      </button>
      {sorted.length === 0 && (
        <div className="empty-state" style={{padding:'30px 16px'}}>
          <div className="empty-text">No observations logged yet for this session.</div>
        </div>
      )}
      <div className="card-list">
        {sorted.map(obs => {
          const canDelete = identity.isSuperuser || obs.addedBy === identity.name || !obs.addedBy;
          return <ObservationCard key={obs.id} obs={obs} equipment={equipment} onDelete={canDelete ? ()=>deleteObservation(obs.id) : null} onTap={()=>setEditingObservation(obs)} />;
        })}
      </div>
      {showForm && (
        <ObservationForm gpsPos={gpsPos} equipment={equipment} lastEquipmentId={session.lastEquipmentId}
          identity={identity} onSave={saveObservation} onClose={()=>setShowForm(false)} />
      )}
      {editingObservation && (
        <ObservationForm observation={editingObservation} gpsPos={gpsPos} equipment={equipment} lastEquipmentId={session.lastEquipmentId}
          identity={identity} onSave={saveObservation} onClose={()=>setEditingObservation(null)} />
      )}
    </div>
  );
}

function ObservationCard({ obs, equipment, onDelete, onTap }) {
  const eq = equipment.find(e => e.id === obs.equipmentId);
  const color = ACTIVITY_COLORS[obs.activity] || ACTIVITY_COLORS.unknown;
  return (
    <div className="card obs-card card-tap" onClick={onTap} role="button" tabIndex={0}>
      <div className="obs-color-bar" style={{background:color}} />
      <div className="card-main">
        <div className="card-title">{obs.species}</div>
        <div className="card-sub">
          {obs.time} · {(ACTIVITY_TYPES.find(a=>a.id===obs.activity)||{}).label || obs.activity}
          {eq && ` · ${eq.unitId}`}
          {(obs.lat == null || obs.lon == null) && ' · no location'}
          {obs.photoTap && ' · marked on photo'}
          {obs.addedDuringAnalysis && ' · post-survey'}
          {obs.addedBy && ` · ${obs.addedBy}`}
        </div>
        {obs.notes && <div className="obs-notes">{obs.notes}</div>}
      </div>
      {onDelete && <button className="btn btn-icon btn-small" onClick={(e)=>{ e.stopPropagation(); onDelete(); }} aria-label="Delete observation"><IconTrash/></button>}
    </div>
  );
}

function AnnotatedPhotoView({ photo, observations, onClose }) {
  return (
    <Modal title="Annotated photo" onClose={onClose}>
      <div className="field-hint" style={{marginBottom:10}}>
        Markers show where each observation was tapped on this photo. Colour = activity type.
      </div>
      <div className="photo-tap-wrap" style={{cursor:'default'}}>
        <img src={photo} alt="Reference" draggable={false} />
        {observations.map(obs => (
          <div
            key={obs.id}
            className={`photo-tap-marker ${obs.activity === 'emergence' ? 'photo-tap-marker-star' : ''}`}
            style={{
              left: `${obs.photoTap.x*100}%`,
              top: `${obs.photoTap.y*100}%`,
              background: ACTIVITY_COLORS[obs.activity] || ACTIVITY_COLORS.unknown
            }}
            title={`${obs.species} — ${obs.time}`}
          />
        ))}
      </div>
      <div className="card-list" style={{marginTop:10}}>
        {observations.map(obs => (
          <div className="card obs-card" key={obs.id}>
            <div className="obs-color-bar" style={{background: ACTIVITY_COLORS[obs.activity] || ACTIVITY_COLORS.unknown}} />
            <div className="card-main">
              <div className="card-title">{obs.species}</div>
              <div className="card-sub">{obs.time} · {(ACTIVITY_TYPES.find(a=>a.id===obs.activity)||{}).label}</div>
            </div>
          </div>
        ))}
      </div>
      <div className="modal-actions">
        <button className="btn btn-secondary btn-full" onClick={onClose}>Close</button>
      </div>
    </Modal>
  );
}

function PhotoTapPicker({ photo, initialPos, onPick, onClose }) {
  const imgRef = useRef(null);
  const [pos, setPos] = useState(initialPos);

  function handleTap(e) {
    const rect = imgRef.current.getBoundingClientRect();
    const clientX = e.touches ? e.changedTouches[0].clientX : e.clientX;
    const clientY = e.touches ? e.changedTouches[0].clientY : e.clientY;
    const x = (clientX - rect.left) / rect.width;
    const y = (clientY - rect.top) / rect.height;
    setPos({ x: Math.min(1, Math.max(0, x)), y: Math.min(1, Math.max(0, y)) });
  }

  if (!photo) {
    return (
      <Modal title="Tap point on photo" onClose={onClose}>
        <div className="field-hint">No reference photo set for this equipment.</div>
        <div className="modal-actions"><button className="btn btn-secondary btn-full" onClick={onClose}>Close</button></div>
      </Modal>
    );
  }

  return (
    <Modal title="Tap point on photo" onClose={onClose}>
      <div className="field-hint" style={{marginBottom:10}}>Tap the spot where the activity was observed — e.g. a gable end or ridge tile.</div>
      <div className="photo-tap-wrap" ref={imgRef} onClick={handleTap}>
        <img src={photo} alt="Reference" draggable={false} />
        {pos && <div className="photo-tap-marker" style={{ left: `${pos.x*100}%`, top: `${pos.y*100}%` }} />}
      </div>
      <div className="field-hint" style={{marginTop:10}}>
        {pos ? 'Point marked — tap again to move it.' : 'Tap the photo to mark the spot.'}
      </div>
      <div className="modal-actions">
        <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn-primary" disabled={!pos} onClick={()=>onPick(pos)}>Use this point</button>
      </div>
    </Modal>
  );
}

function PointPickerMap({ initialCoords, centerHint, onPick, onClose }) {
  const mapRef = useRef(null);
  const mapInstanceRef = useRef(null);
  const markerRef = useRef(null);
  const [coords, setCoords] = useState(initialCoords);

  useEffect(() => {
    const L = window.L;
    if (!L || !mapRef.current || mapInstanceRef.current) return;
    const center = initialCoords || centerHint || [51.5, -0.1];
    const map = L.map(mapRef.current, { zoomControl: true }).setView(center, (initialCoords || centerHint) ? 19 : 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 21, attribution: '© OpenStreetMap' }).addTo(map);

    if (initialCoords) {
      markerRef.current = L.marker(initialCoords, { draggable: true }).addTo(map);
      markerRef.current.on('dragend', () => {
        const ll = markerRef.current.getLatLng();
        setCoords([ll.lat, ll.lng]);
      });
    }

    map.on('click', (e) => {
      const { lat, lng } = e.latlng;
      if (markerRef.current) {
        markerRef.current.setLatLng([lat, lng]);
      } else {
        markerRef.current = L.marker([lat, lng], { draggable: true }).addTo(map);
        markerRef.current.on('dragend', () => {
          const ll = markerRef.current.getLatLng();
          setCoords([ll.lat, ll.lng]);
        });
      }
      setCoords([lat, lng]);
    });

    mapInstanceRef.current = map;
    setTimeout(() => map.invalidateSize(), 100);

    if (!initialCoords && !centerHint && navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => map.setView([pos.coords.latitude, pos.coords.longitude], 18),
        () => {},
        { enableHighAccuracy: true, timeout: 8000 }
      );
    }

    return () => { map.remove(); mapInstanceRef.current = null; };
  }, []);

  return (
    <Modal title="Pick location" onClose={onClose}>
      <div className="field-hint" style={{marginBottom:10}}>Tap the map to drop a pin, or drag it to adjust.</div>
      <div className="map-container" style={{height:280}} ref={mapRef} />
      <div className="field-hint" style={{marginTop:10}}>
        {coords ? `${coords[0].toFixed(6)}, ${coords[1].toFixed(6)}` : 'Tap the map to set a point.'}
      </div>
      <div className="modal-actions">
        <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn-primary" disabled={!coords} onClick={()=>onPick(coords)}>Use this point</button>
      </div>
    </Modal>
  );
}

function ObservationForm({ observation, gpsPos, equipment, lastEquipmentId, identity, onSave, onClose }) {
  const isEdit = !!observation;
  const canEdit = !isEdit || identity.isSuperuser || observation.addedBy === identity.name || !observation.addedBy;
  const readOnly = isEdit && !canEdit;

  const [time, setTime] = useState(observation ? observation.time : nowTimeStr());
  const [species, setSpecies] = useState(observation ? observation.species : UK_SPECIES[0]);
  const [activity, setActivity] = useState(observation ? observation.activity : 'emergence');
  const [equipmentId, setEquipmentId] = useState(observation ? (observation.equipmentId || '') : (lastEquipmentId || (equipment[0] ? equipment[0].id : '')));
  const [notes, setNotes] = useState(observation ? (observation.notes || '') : '');
  const [locMode, setLocMode] = useState(observation ? (observation.photoTap ? 'photo' : (observation.lat != null ? 'manual' : 'gps')) : 'gps');
  const [manualCoords, setManualCoords] = useState(observation ? (observation.lat != null ? [observation.lat, observation.lon] : null) : (gpsPos || null));
  const [showPicker, setShowPicker] = useState(false);
  const [photoTapEquipmentId, setPhotoTapEquipmentId] = useState(observation && observation.photoTap ? (observation.equipmentId || '') : '');
  const [photoTapPos, setPhotoTapPos] = useState(observation ? (observation.photoTap || null) : null); // {x, y} as fractions 0-1
  const [showPhotoPicker, setShowPhotoPicker] = useState(false);
  const [isRecording, setIsRecording] = useState(false);
  const recognitionRef = useRef(null);

  const equipmentWithPhotos = equipment.filter(eq => eq.photo);

  const coords = locMode === 'gps' ? gpsPos
    : locMode === 'manual' ? manualCoords
    : locMode === 'photo' ? (() => {
        const eq = equipment.find(e => e.id === photoTapEquipmentId);
        return eq ? [eq.lat, eq.lon] : null;
      })()
    : null;

  function toggleSpeech() {
    if (isRecording) { recognitionRef.current && recognitionRef.current.stop(); setIsRecording(false); return; }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert('Speech recognition is not available on this device/browser. Please type notes manually.'); return; }
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-GB';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.onresult = (e) => setNotes(prev => (prev ? prev+' ' : '') + e.results[0][0].transcript);
    recognition.onerror = () => setIsRecording(false);
    recognition.onend = () => setIsRecording(false);
    recognitionRef.current = recognition;
    recognition.start();
    setIsRecording(true);
  }

  function handleSave() {
    if (locMode === 'photo' && photoTapEquipmentId && !photoTapPos) {
      alert('Tap a point on the photo to mark where this was observed.');
      return;
    }
    if (!coords) {
      const proceed = confirm('No location set — save this observation without coordinates? You can add a location later if needed.');
      if (!proceed) return;
    }
    const eq = equipment.find(e => e.id === (locMode === 'photo' ? photoTapEquipmentId : equipmentId));
    onSave({
      id: observation ? observation.id : uid(),
      time, lat: coords ? coords[0] : null, lon: coords ? coords[1] : null, species, activity,
      equipmentId: (locMode === 'photo' ? photoTapEquipmentId : equipmentId) || null,
      equipmentUnitId: eq ? eq.unitId : '',
      notes,
      photoTap: (locMode === 'photo' && photoTapPos) ? { x: photoTapPos.x, y: photoTapPos.y } : null,
      ...(observation ? { addedBy: observation.addedBy, addedDuringAnalysis: observation.addedDuringAnalysis } : {}),
    });
  }

  return (
    <Modal title={isEdit ? 'Observation' : 'Add observation'} onClose={onClose}>
      {readOnly && (
        <div className="map-banner" style={{marginBottom:12}}>
          <span style={{display:'inline-flex', alignItems:'center', gap:6}}><span style={{width:14,height:14}}><IconLock/></span> View only — recorded by {observation.addedBy}.</span>
        </div>
      )}
      <fieldset disabled={readOnly} style={{border:'none', padding:0, margin:0}}>
      <FieldRow label="Time">
        <div className="inline-field">
          <input type="time" className="text-input" value={time} onChange={e=>setTime(e.target.value)} />
          <button className="btn btn-secondary btn-small" onClick={()=>setTime(nowTimeStr())}>Now</button>
        </div>
      </FieldRow>
      <FieldRow label="Location">
        <div className="segmented">
          <button className={`segment ${locMode==='gps'?'segment-active':''}`} onClick={()=>setLocMode('gps')}><IconCrosshair/> My position</button>
          <button className={`segment ${locMode==='manual'?'segment-active':''}`} onClick={()=>setLocMode('manual')}><IconMapPin/> Mark point</button>
        </div>
        {(equipmentWithPhotos.length > 0 || locMode === 'photo') && (
          <div className="segmented" style={{marginTop:6}}>
            <button className={`segment ${locMode==='photo'?'segment-active':''}`} onClick={()=>setLocMode('photo')}><IconCamera/> From photo</button>
          </div>
        )}
        {locMode==='gps' && (
          <div className="field-hint">
            {gpsPos ? `${gpsPos[0].toFixed(6)}, ${gpsPos[1].toFixed(6)}` : 'Waiting for GPS signal — if this site has no signal/no fix, switch to "Mark point" to enter coordinates manually, or save without a location.'}
          </div>
        )}
        {locMode==='manual' && (
          <div className="field-hint">
            Use current position as starting point and adjust below — e.g. for an emergence point on a roofline away from where you're standing.
            <div className="inline-field" style={{marginTop:6}}>
              <input type="number" step="0.000001" className="text-input" value={manualCoords ? manualCoords[0] : ''} onChange={e=>setManualCoords([Number(e.target.value), manualCoords ? manualCoords[1] : 0])} placeholder="Latitude" />
              <input type="number" step="0.000001" className="text-input" value={manualCoords ? manualCoords[1] : ''} onChange={e=>setManualCoords([manualCoords ? manualCoords[0] : 0, Number(e.target.value)])} placeholder="Longitude" />
            </div>
            <div className="inline-field" style={{marginTop:6}}>
              <button className="btn btn-secondary btn-small btn-full" onClick={()=>setShowPicker(true)}><IconMapPin/> Pick on map</button>
              {gpsPos && <button className="btn btn-secondary btn-small btn-full" onClick={()=>setManualCoords(gpsPos)}>Use my position</button>}
            </div>
            {!manualCoords && !gpsPos && <div style={{marginTop:6}}>No GPS fix yet — type coordinates, pick on map, or save without a location.</div>}
          </div>
        )}
        {locMode==='photo' && equipmentWithPhotos.length === 0 && (
          <div className="field-hint">
            This observation was marked on an equipment photo that isn't available on this device (reference photos aren't synced between devices).
            {coords && <div style={{marginTop:6}}>Recorded location: {coords[0].toFixed(6)}, {coords[1].toFixed(6)} (the equipment's position).</div>}
            <div style={{marginTop:6}}>To change the location, switch to "My position" or "Mark point" above.</div>
          </div>
        )}
        {locMode==='photo' && equipmentWithPhotos.length > 0 && (
          <div className="field-hint">
            <select className="text-input" value={photoTapEquipmentId} onChange={e=>{ setPhotoTapEquipmentId(e.target.value); setPhotoTapPos(null); }} style={{marginBottom:8}}>
              <option value="">— Choose equipment photo —</option>
              {equipmentWithPhotos.map(eq => <option key={eq.id} value={eq.id}>{eq.unitId} ({(KIT_TYPES[eq.kit]||{}).label})</option>)}
            </select>
            {photoTapEquipmentId && (
              <React.Fragment>
                <button className="btn btn-secondary btn-small btn-full" onClick={()=>setShowPhotoPicker(true)}>
                  <IconCamera/> {photoTapPos ? 'Adjust point on photo' : 'Tap point on photo'}
                </button>
                {photoTapPos && <div style={{marginTop:6}}>Point marked on photo. Location used for export: the equipment's recorded position.</div>}
              </React.Fragment>
            )}
          </div>
        )}
      </FieldRow>

      {showPhotoPicker && photoTapEquipmentId && (
        <PhotoTapPicker
          photo={(equipment.find(e=>e.id===photoTapEquipmentId)||{}).photo}
          initialPos={photoTapPos}
          onPick={(pos) => { setPhotoTapPos(pos); setShowPhotoPicker(false); }}
          onClose={() => setShowPhotoPicker(false)}
        />
      )}

      {showPicker && (
        <PointPickerMap
          initialCoords={manualCoords || null}
          centerHint={gpsPos}
          onPick={(coords) => { setManualCoords(coords); setShowPicker(false); }}
          onClose={() => setShowPicker(false)}
        />
      )}

      <FieldRow label="Species">
        <select className="text-input" value={species} onChange={e=>setSpecies(e.target.value)}>
          {UK_SPECIES.map(s => <option key={s} value={s}>{s}</option>)}
        </select>
      </FieldRow>
      <FieldRow label="Activity type">
        <select className="text-input" value={activity} onChange={e=>setActivity(e.target.value)}>
          {ACTIVITY_TYPES.map(a => <option key={a.id} value={a.id}>{a.label}</option>)}
        </select>
      </FieldRow>
      {locMode !== 'photo' && (
        <FieldRow label="Equipment point">
          <select className="text-input" value={equipmentId} onChange={e=>setEquipmentId(e.target.value)}>
            <option value="">— None —</option>
            {equipment.map(eq => <option key={eq.id} value={eq.id}>{eq.unitId} ({(KIT_TYPES[eq.kit]||{}).label})</option>)}
          </select>
          <div className="field-hint">Remembered for the next observation — change anytime.</div>
        </FieldRow>
      )}
      <FieldRow label="Notes">
        <div className="notes-input-wrap">
          <textarea className="text-input textarea" rows={3} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Type or use voice..." />
          <button className={`voice-btn ${isRecording?'voice-btn-active':''}`} onClick={toggleSpeech} aria-label="Voice note">
            {isRecording ? <IconSquare/> : <IconMic/>}
          </button>
        </div>
        {isRecording && <div className="field-hint">Listening... tap again to stop. Edit the text afterwards if needed.</div>}
      </FieldRow>
      </fieldset>
      <div className="modal-actions">
        <button className="btn btn-secondary" onClick={onClose}>{readOnly ? 'Close' : 'Cancel'}</button>
        {!readOnly && <button className="btn btn-primary" onClick={handleSave}>{isEdit ? 'Save changes' : 'Save observation'}</button>}
      </div>
    </Modal>
  );
}

/* ============================================================
   SHARED UI
   ============================================================ */
function AlertBanner({ name, info, identity, onGoToMap, onClear }) {
  const [, forceTick] = useState(0);
  useEffect(() => {
    const t = setInterval(() => forceTick(x => x+1), 10000);
    return () => clearInterval(t);
  }, []);

  const since = info.alert && info.alert.since;
  const ageMin = since ? Math.max(0, Math.round((Date.now() - since) / 60000)) : null;
  const ageLabel = ageMin == null ? '' : ageMin < 1 ? 'just now' : `${ageMin}m ago`;

  return (
    <div className="alert-banner" onClick={onGoToMap}>
      <span className="alert-banner-icon"><IconAlert/></span>
      <span className="alert-banner-text">
        <strong>{name}</strong> needs help{ageLabel ? ` — ${ageLabel}` : ''}
        {info.lat != null && info.lon != null ? ' — tap to view location' : ''}
      </span>
      {identity.isSuperuser && (
        <button className="btn btn-secondary btn-small" onClick={(e)=>{ e.stopPropagation(); if (confirm(`Clear ${name}'s alert? Only do this once you've confirmed they're safe.`)) onClear(); }}>
          Clear
        </button>
      )}
    </div>
  );
}

function BrandBar() {
  return <div className="brand-bar">Aerial Ecology · BatAssist</div>;
}

function Header({ title, subtitle, onBack, identity, onSwitchUser }) {
  return (
    <div className="header-wrap">
      <BrandBar />
      <div className="header">
        {onBack && <button className="back-btn" onClick={onBack} aria-label="Back"><span style={{width:22,height:22}}><IconBack/></span></button>}
        <div className="header-text">
          <div className="header-title">{title}</div>
          {subtitle && <div className="header-subtitle">{subtitle}</div>}
        </div>
        {identity && (
          <button className="identity-pill" onClick={onSwitchUser}>
            <span style={{width:14,height:14}}><IconUser/></span>
            {identity.name}
            {identity.isSuperuser && <span style={{width:12,height:12}}><IconLock/></span>}
          </button>
        )}
      </div>
    </div>
  );
}
function EmptyState({ icon, title, text }) {
  return (
    <div className="empty-state">
      <div className="empty-icon" style={{width:32,height:32}}>{icon}</div>
      <div className="empty-title">{title}</div>
      <div className="empty-text">{text}</div>
    </div>
  );
}
function IdentityModal({ current, onSave, onClose }) {
  const [name, setName] = useState(current ? current.name : '');
  const [wantsSuperuser, setWantsSuperuser] = useState(current ? current.isSuperuser : false);
  const [pin, setPin] = useState('');
  const [pinError, setPinError] = useState(false);
  const canClose = !!current; // first-run (no current identity) cannot be dismissed without saving

  function handleSave() {
    if (!name.trim()) return;
    let isSuperuser = current ? current.isSuperuser : false;
    if (wantsSuperuser && !isSuperuser) {
      if (pin === COORDINATOR_PIN) {
        isSuperuser = true;
        setPinError(false);
      } else {
        setPinError(true);
        return;
      }
    }
    if (!wantsSuperuser) isSuperuser = false;
    onSave({ name: name.trim(), isSuperuser });
  }

  return (
    <Modal title={current ? 'Switch user' : 'Welcome'} onClose={canClose ? onClose : undefined}>
      {!current && (
        <p className="modal-text" style={{marginBottom:14}}>
          Enter your name — this is recorded against every observation and equipment change you make, so the team knows who logged what.
        </p>
      )}
      <FieldRow label="Your name">
        <input className="text-input" placeholder="e.g. Rob, Sarah" value={name} onChange={e=>setName(e.target.value)} autoFocus />
      </FieldRow>
      <FieldRow label="Coordinator access">
        <div className="segmented">
          <button className={`segment ${!wantsSuperuser?'segment-active':''}`} onClick={()=>setWantsSuperuser(false)}>Surveyor</button>
          <button className={`segment ${wantsSuperuser?'segment-active':''}`} onClick={()=>setWantsSuperuser(true)}><IconLock/> Coordinator</button>
        </div>
        {wantsSuperuser && !(current && current.isSuperuser) && (
          <div style={{marginTop:8}}>
            <input type="password" inputMode="numeric" className="text-input" placeholder="Enter coordinator PIN" value={pin} onChange={e=>{ setPin(e.target.value); setPinError(false); }} />
            {pinError && <div className="field-hint field-hint-error">Incorrect PIN.</div>}
          </div>
        )}
        <div className="field-hint">Coordinators can edit session setup, manage projects, and export data. Everyone can use the map and log observations.</div>
      </FieldRow>
      <div className="modal-actions">
        {canClose && <button className="btn btn-secondary" onClick={onClose}>Cancel</button>}
        <button className="btn btn-primary btn-full" disabled={!name.trim()} onClick={handleSave}>Save</button>
      </div>
    </Modal>
  );
}

function Modal({ children, onClose, title }) {
  return (
    <div className="modal-overlay" onClick={onClose || undefined}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div className="modal-title">{title}</div>
          {onClose && <button className="modal-close" onClick={onClose}><IconX/></button>}
        </div>
        <div className="modal-body">{children}</div>
      </div>
    </div>
  );
}
function Section({ title, children }) {
  return <div className="section"><div className="section-title">{title}</div>{children}</div>;
}
function FieldRow({ label, children }) {
  return <div className="field-row"><label className="field-label">{label}</label>{children}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
